<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clarity</title>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- PWA Meta -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clarity">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<style>
/* ─── Reset ─────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #000; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: none;
}

/* ─── App Shell ─────────────────────────────────────────── */
#app {
  position: relative;
  width: 100%;
  max-width: 430px;
  height: 100dvh;
  margin: 0 auto;
  overflow: hidden;
  background: #000;
}

/* ─── View System ───────────────────────────────────────── */
.view {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: #000;
  will-change: transform;
  transition: transform 0.34s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
#view-list { transform: translateX(0); z-index: 1; }
#view-list.pushed { transform: translateX(-28%); pointer-events: none; }
#view-chat { transform: translateX(100%); z-index: 2; }
#view-chat.active { transform: translateX(0); }

/* ─── Status Bar (browser only) ─────────────────────────── */
.status-bar { display: none !important; visibility: hidden; height: 0; overflow: hidden; }
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 20px 4px;
  font-size: 14px; font-weight: 600;
  flex-shrink: 0;
}
.status-bar { display: none !important; visibility: hidden; height: 0; overflow: hidden; }

/* ─── List View: Header ─────────────────────────────────── */
.list-header { flex-shrink: 0; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 20px 12px;
}
.header-title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.header-btn {
  width: 32px; height: 32px;
  border-radius: 50%; background: #1c1c1e;
  border: none; color: #007AFF; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}

/* ─── Search ─────────────────────────────────────────────── */
.search-bar { padding: 0 16px 12px; }
.search-input {
  width: 100%; background: #1c1c1e; border: none;
  border-radius: 10px; padding: 10px 16px;
  color: #fff; font-size: 15px; font-family: inherit; outline: none;
}
.search-input::placeholder { color: #636366; }

/* ─── List Scrollable ────────────────────────────────────── */
.list-scrollable { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.list-scrollable::-webkit-scrollbar { display: none; }

/* ─── Gallery ────────────────────────────────────────────── */
.gallery-section { padding: 0 8px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.gallery-section::-webkit-scrollbar { display: none; }
.gallery-scroll { display: flex; gap: 4px; padding: 0 8px; min-width: min-content; }
.gallery-item {
  display: flex; flex-direction: column; align-items: center;
  width: 80px; flex-shrink: 0; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.gallery-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #fff;
  margin-bottom: 6px; position: relative; overflow: visible;
  transition: transform 0.15s;
}
.gallery-avatar:active { transform: scale(0.92); }
.gallery-avatar.clarity  { background: linear-gradient(135deg, #00305C, #0054A0); }
.gallery-avatar.mark     { background: linear-gradient(135deg, #1B6B3A, #2DA05A); }
.gallery-avatar.guide    { background: linear-gradient(135deg, #8B4513, #C6772E); }
.gallery-avatar.feedback { background: linear-gradient(135deg, #7B1FA2, #AB47BC); }
.gallery-avatar.sub { width: 56px; height: 56px; font-size: 14px; background: #1c1c1e; border: 2px solid #333; }
.gallery-label { font-size: 11px; color: #8e8e93; text-align: center; max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gallery-badge {
  position: absolute; top: -2px; right: -2px;
  background: #007AFF; color: #fff;
  font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
  border-radius: 9px; display: flex; align-items: center; justify-content: center;
  padding: 0 4px; border: 2px solid #000;
}

/* ─── Section ────────────────────────────────────────────── */
.divider { height: 1px; background: #1c1c1e; margin: 4px 20px 8px; }
.section-label { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 20px; }

/* ─── Chat List ──────────────────────────────────────────── */
.chat-list { padding: 0; }
.chat-item {
  display: flex; align-items: center;
  padding: 12px 20px; gap: 12px;
  cursor: pointer; position: relative;
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.chat-item:active { background: #1a1a1a; }
.chat-item + .chat-item { border-top: 1px solid rgba(255,255,255,0.05); }
.chat-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: #1c1c1e;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff;
  flex-shrink: 0; position: relative;
}
.chat-status { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid #000; }
.chat-status.green { background: #34C759; }
.chat-status.amber { background: #FF9500; }
.chat-status.red   { background: #FF3B30; }
.chat-content { flex: 1; min-width: 0; }
.chat-top-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.chat-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; margin-right: 6px; }
.chat-time { font-size: 13px; color: #8e8e93; flex-shrink: 0; }
.chat-preview { font-size: 14px; color: #8e8e93; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-pin { color: #FF9500; font-size: 11px; margin-left: 3px; }
.list-spacer { height: 16px; }

/* ─── Loading / Skeleton ─────────────────────────────────── */
.loading-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 24px; gap: 12px;
}
.loading-spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2.5px solid #1c1c1e; border-top-color: #007AFF;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #636366; }

.skeleton-item {
  display: flex; align-items: center;
  padding: 12px 20px; gap: 12px;
}
.skeleton-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: #1c1c1e; flex-shrink: 0;
  animation: shimmer 1.4s ease-in-out infinite;
}
.skeleton-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.skeleton-line {
  height: 12px; border-radius: 6px; background: #1c1c1e;
  animation: shimmer 1.4s ease-in-out infinite;
}
.skeleton-line.short { width: 45%; }
@keyframes shimmer {
  0%, 100% { opacity: 0.5; }
  50%       { opacity: 1; }
}

.error-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 24px; gap: 12px;
}
.error-icon { font-size: 32px; }
.error-text { font-size: 14px; color: #636366; text-align: center; }
.retry-btn {
  margin-top: 8px; padding: 8px 20px; border-radius: 20px;
  background: #1c1c1e; border: none; color: #007AFF;
  font-size: 15px; font-family: inherit; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* ─── Bottom Nav ─────────────────────────────────────────── */
.bottom-nav {
  flex-shrink: 0;
  background: rgba(0,0,0,0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid #1c1c1e;
  display: flex; justify-content: space-around;
  padding: 8px 0 env(safe-area-inset-bottom, 20px);
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #636366; font-size: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.nav-item.active { color: #007AFF; }
.nav-icon { font-size: 22px; }

/* ══════════════════════════════════════════════════════════ */
/*  CHAT VIEW                                                 */
/* ══════════════════════════════════════════════════════════ */

/* Nav bar */
.chat-nav-header {
  flex-shrink: 0;
  display: flex; align-items: center;
  padding: 10px 12px;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  min-height: 56px; gap: 4px;
}
.back-btn {
  display: flex; align-items: center; gap: 2px;
  background: none; border: none; color: #007AFF;
  cursor: pointer; padding: 6px 8px 6px 0;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.back-btn:active { opacity: 0.55; }
.back-label { font-size: 17px; color: #007AFF; font-weight: 400; }

.chat-contact-block {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 1px; min-width: 0;
}
.chat-contact-avatar-sm {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
  flex-shrink: 0; margin-bottom: 1px;
}
.chat-contact-name-sm {
  font-size: 15px; font-weight: 600; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 180px; line-height: 1.2;
}
.chat-contact-stage-sm {
  font-size: 11px; font-weight: 500; color: #8e8e93;
  letter-spacing: 0.1px; white-space: nowrap;
}
.chat-info-btn {
  background: none; border: none; color: #007AFF; font-size: 20px;
  cursor: pointer; padding: 6px 0 6px 8px;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.chat-info-btn:active { opacity: 0.55; }

/* Jump-to-app button */
.jump-to-app-btn {
  background: none; border: none;
  color: #007AFF; font-size: 11px; font-weight: 600; font-family: inherit;
  cursor: pointer; padding: 5px 0 5px 8px;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  letter-spacing: 0.1px;
}
.jump-to-app-btn:active { opacity: 0.55; }
.jump-to-app-icon { font-size: 17px; line-height: 1; }

/* Messages area */
.messages-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 8px 12px 4px; scroll-behavior: smooth;
}
.messages-area::-webkit-scrollbar { display: none; }
#messages-content { display: flex; flex-direction: column; }

/* Date divider */
.msg-ts-divider {
  text-align: center; font-size: 12px; color: #636366; font-weight: 500;
  padding: 14px 0 10px; letter-spacing: 0.05px; flex-shrink: 0;
}

/* Message row */
.msg-row {
  display: flex; align-items: flex-end; gap: 6px; flex-shrink: 0;
}
.msg-row + .msg-row { margin-top: 2px; }
.msg-row.group-gap { margin-top: 10px; }
.msg-row.sent { justify-content: flex-end; }
.msg-row.received { justify-content: flex-start; }

/* Small avatar for received side */
.msg-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, #00305C, #0054A0);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; color: #fff;
  flex-shrink: 0; align-self: flex-end; letter-spacing: -0.5px;
}
.msg-avatar.hidden { visibility: hidden; }

/* Bubble */
.bubble {
  max-width: min(72%, 290px);
  padding: 9px 14px; font-size: 15px; line-height: 1.45;
  word-break: break-word; white-space: pre-wrap;
}
/* Sent */
.bubble.sent { background: #00305C; color: #fff; border-radius: 18px; align-self: flex-end; }
.bubble.sent.tail { border-radius: 18px 18px 5px 18px; }
/* Received */
.bubble.received { background: #1c1c1e; color: #fff; border-radius: 18px; align-self: flex-start; }
.bubble.received.tail { border-radius: 18px 18px 18px 5px; }

/* Sender name above first bubble in group */
.msg-sender-name {
  font-size: 11px; color: #636366; padding: 0 4px 2px;
  align-self: flex-start; flex-shrink: 0; white-space: nowrap;
}

/* Delivery receipt */
.delivery-row { display: flex; justify-content: flex-end; padding: 1px 4px 6px; flex-shrink: 0; }
.delivery-receipt { font-size: 11.5px; color: #636366; }

/* Typing indicator */
#typing-indicator {
  display: none; align-items: flex-end; gap: 6px;
  margin-top: 10px; flex-shrink: 0;
}
.typing-bubble {
  background: #1c1c1e; border-radius: 18px 18px 18px 5px;
  padding: 10px 14px; display: flex; align-items: center; gap: 4px; height: 36px;
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #636366;
  animation: typingPulse 1.4s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: 0.18s; }
.typing-dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes typingPulse {
  0%, 70%, 100% { transform: scale(0.75); opacity: 0.35; }
  35%            { transform: scale(1.1);  opacity: 1; }
}

/* Chat loading */
.chat-loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 10px;
}
.chat-loading .loading-spinner { border-top-color: #007AFF; }
.chat-loading .loading-text { font-size: 13px; color: #636366; }

/* Input area */
.input-area {
  flex-shrink: 0;
  background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.07);
  padding: 8px 12px calc(8px + env(safe-area-inset-bottom, 16px));
}
.input-row { display: flex; align-items: flex-end; gap: 8px; }
.input-plus-btn {
  width: 32px; height: 32px; border-radius: 50%; background: #1c1c1e; border: none;
  color: #007AFF; font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  transition: opacity 0.12s;
}
.input-plus-btn:active { opacity: 0.6; }
.input-field-wrap {
  flex: 1; background: #1c1c1e; border-radius: 20px;
  padding: 7px 14px;
  display: flex; align-items: flex-end; min-height: 34px;
}
.input-field {
  width: 100%; background: none; border: none; outline: none;
  color: #fff; font-size: 15px; font-family: inherit; line-height: 1.4;
  resize: none; max-height: 96px; overflow-y: auto; display: block;
}
.input-field::placeholder { color: #636366; }
.input-field::-webkit-scrollbar { display: none; }
.send-btn {
  width: 32px; height: 32px; border-radius: 50%; background: #007AFF;
  border: none; color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, opacity 0.15s, transform 0.1s;
}
.send-btn:active { transform: scale(0.88); }
.send-btn.inactive { background: #2c2c2e; opacity: 0.5; pointer-events: none; }

/* Refresh indicator */
.refresh-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #34C759;
  flex-shrink: 0; animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── Pinned chat item highlight ─────────────────────────── */
.chat-item.pinned-item { background: rgba(255,149,0,0.04); }
.chat-item.pinned-item .chat-name::before {
  content: "📌 "; font-size: 11px; vertical-align: middle;
}

/* ── Pin icon on chat items ──────────────────────────────── */
.pin-btn {
  background: none; border: none; padding: 6px 0 6px 6px; cursor: pointer;
  color: #3c3c3e; font-size: 16px; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent; line-height: 1;
  transition: color 0.15s;
}
.pin-btn.pinned { color: #FF9500; }
.pin-btn:active { opacity: 0.6; }

/* ── Agent tab dropdown ──────────────────────────────────── */
.agent-tab-bar {
  flex-shrink: 0;
  display: flex; gap: 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: rgba(10,10,10,0.97);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 0 4px;
}
.agent-tab-bar::-webkit-scrollbar { display: none; }

.agent-tab {
  flex-shrink: 0; padding: 9px 14px;
  font-size: 12px; font-weight: 600; color: #636366;
  cursor: pointer; border: none; background: none;
  font-family: inherit; -webkit-tap-highlight-color: transparent;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.agent-tab.active { color: #fff; border-bottom-color: #007AFF; }
.agent-tab:active { opacity: 0.7; }

/* ── Gallery items — clickable global agents ─────────────── */
.gallery-item.agent-clickable .gallery-avatar {
  cursor: pointer;
}
.gallery-item.agent-clickable:active .gallery-avatar {
  transform: scale(0.88);
}

/* ══════════════════════════════════════════════════════════ */
/*  LOGIN VIEW                                                */
/* ══════════════════════════════════════════════════════════ */
#view-login {
  z-index: 10;
  justify-content: center;
  align-items: center;
  background: #000;
  padding: 32px 24px;
  gap: 0;
}
#view-login.hidden { display: none; }

.login-logo {
  font-size: 52px; font-weight: 800; letter-spacing: -2px;
  color: #fff; margin-bottom: 6px; line-height: 1;
  display: flex; align-items: center; gap: 10px;
}
.login-logo-mark {
  width: 52px; height: 52px; border-radius: 14px;
  background: linear-gradient(135deg, #00305C, #0054A0);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #fff;
}
.login-tagline {
  font-size: 13px; color: #636366; margin-bottom: 48px; text-align: center;
}

/* Google Sign-In button wrapper */
.google-signin-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%;
}
.google-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; max-width: 320px;
  background: #fff; color: #1a1a1a;
  border: none; border-radius: 12px;
  padding: 14px 20px;
  font-size: 15px; font-weight: 600; font-family: inherit;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.google-btn:active { opacity: 0.85; transform: scale(0.97); }
.google-btn.loading { opacity: 0.6; pointer-events: none; }
.google-btn svg { flex-shrink: 0; }

.login-error {
  font-size: 13px; color: #FF3B30; text-align: center;
  max-width: 280px; display: none;
}
.login-error.visible { display: block; }

.login-loading {
  display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 48px 0;
}

/* ══════════════════════════════════════════════════════════ */
/*  PIPELINE VIEW                                             */
/* ══════════════════════════════════════════════════════════ */
#view-pipeline {
  transform: translateX(0); z-index: 0;
  display: none;
}
#view-pipeline.pipeline-active {
  display: flex;
}

.pipeline-header {
  flex-shrink: 0;
  padding: 4px 20px 12px;
}
.pipeline-title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }

.pipeline-scrollable {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0 0 16px;
}
.pipeline-scrollable::-webkit-scrollbar { display: none; }

/* KPI row */
.kpi-row {
  display: flex; gap: 10px; padding: 0 16px 20px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.kpi-row::-webkit-scrollbar { display: none; }
.kpi-card {
  flex-shrink: 0; background: #1c1c1e; border-radius: 14px;
  padding: 14px 16px; min-width: 110px;
  display: flex; flex-direction: column; gap: 4px;
}
.kpi-value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
.kpi-label { font-size: 11px; color: #8e8e93; font-weight: 500; }
.kpi-sub   { font-size: 10px; color: #636366; }
.kpi-card.green .kpi-value { color: #34C759; }
.kpi-card.amber .kpi-value { color: #FF9500; }
.kpi-card.blue  .kpi-value { color: #007AFF; }

/* Section header */
.pipeline-section-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 20px 8px;
}
.pipeline-section-title { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
.pipeline-total { font-size: 13px; color: #636366; }

/* Stage bucket row */
.stage-bucket {
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}

<script>
/* ═══════════════════════════════════════════════════════════
   Clarity PWA — Phase 5: Google SSO Login (IFC-678)
   • Login: Google Identity Services → signInUser mutation
   • Auth:  JWT Bearer token stored in localStorage
   • API:   all calls via /api/user-graphql (Authorization header)
   • Scope: projects(mine: true) scoped to signed-in rep
═══════════════════════════════════════════════════════════ */

const GQL      = '/api/graphql';       // unauthenticated (signInUser only)
const USER_GQL = '/api/user-graphql';  // nginx passes Authorization header through

/* ── Auth state ──────────────────────────────────────────── */
const AUTH_KEY = 'clarity_user';
let currentUser = null;  // { id, name, email, token }

function loadStoredUser() {
  try {
    const stored = localStorage.getItem(AUTH_KEY);
    if (stored) currentUser = JSON.parse(stored);
  } catch (e) { currentUser = null; }
}
function saveUser(user) {
  currentUser = user;
  localStorage.setItem(AUTH_KEY, JSON.stringify(user));
}
function clearUser() {
  currentUser = null;
  localStorage.removeItem(AUTH_KEY);
  // Sign out of GIS so they get the account picker again
  if (typeof google !== 'undefined' && google.accounts) {
    google.accounts.id.disableAutoSelect();
  }
}

/* ── GraphQL fetch helper ────────────────────────────────── */
// useAuth=true  → /api/user-graphql + Authorization: Bearer <token>
// useAuth=false → /api/graphql  (signInUser only — no token needed)
async function gql(query, variables = {}, useAuth = true) {
  const endpoint = useAuth ? USER_GQL : GQL;
  const headers  = { 'Content-Type': 'application/json' };
  if (useAuth && currentUser?.token) {
    headers['Authorization'] = currentUser.token.startsWith('user-id:') ? currentUser.token : `Bearer ${currentUser.token}`;
  }
  const res = await fetch(endpoint, {
    method: 'POST',
    headers,
    body: JSON.stringify({ query, variables }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  // Token expired / auth error → kick back to login
  if (useAuth && json.errors?.some(e =>
    /authenticated|unauthorized|not authorized/i.test(e.message || '')
  )) {
    clearUser();
    showLoginView();
    throw new Error('Session expired. Please sign in again.');
  }
  if (json.errors?.length) throw new Error(json.errors[0].message);
  return json.data;
}

/* ── HTML → plain text (strip tags + decode entities) ───── */
function stripHtml(html) {
  if (!html) return '';
  // Remove inline-actions, cite markers, resource-link wrappers
  let text = html
    .replace(/<div class="inline-actions-container">[\s\S]*?<\/div>/gi, '')
    .replace(/<sup class="cite-marker"[^>]*>.*?<\/sup>/gi, '')
    .replace(/<[^>]+>/g, ' ')
    .replace(/\s{2,}/g, ' ')
    .trim();
  // Decode HTML entities
  const ta = document.createElement('textarea');
  ta.innerHTML = text;
  return ta.value.trim();
}

/* ── Relative timestamp ──────────────────────────────────── */
function relativeTime(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const now = new Date();
  const diffMs = now - d;
  const diffDays = Math.floor(diffMs / 86400000);
  if (diffDays === 0) {
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  } else if (diffDays === 1) {
    return 'Yesterday';
  } else if (diffDays < 7) {
    return d.toLocaleDateString('en-US', { weekday: 'short' });
  } else {
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
}

/* ── Format message timestamp for dividers ───────────────── */
function formatMsgTs(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  if (diffDays === 0) return `Today ${time}`;
  if (diffDays === 1) return `Yesterday ${time}`;
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ` · ${time}`;
}

/* ── Stage → status color ────────────────────────────────── */
const STATUS_GREEN = new Set(['INSPECTED','ENOUGH DAMAGE','APPROVED','SUPP COMPLETED','BILLED','COLLECTED','INSTALL COMPLETE','BILLED-BACKEND']);
const STATUS_RED   = new Set(['LOST','DEAD','PA-LAW','CANCELLED','NO DAMAGE','DISPUTED']);
function stageColor(stage) {
  if (!stage) return '';
  const s = stage.toUpperCase();
  if (STATUS_GREEN.has(s)) return 'green';
  if (STATUS_RED.has(s))   return 'red';
  return 'amber';
}

/* ── Avatar gradient palette ─────────────────────────────── */
const AVATAR_COLORS = [
  'linear-gradient(135deg,#003366,#0066CC)',
  'linear-gradient(135deg,#1B6B3A,#2DA05A)',
  'linear-gradient(135deg,#7B1FA2,#AB47BC)',
  'linear-gradient(135deg,#8B4513,#C6772E)',
  'linear-gradient(135deg,#B71C1C,#E53935)',
  'linear-gradient(135deg,#1565C0,#42A5F5)',
  'linear-gradient(135deg,#2E7D32,#66BB6A)',
  'linear-gradient(135deg,#4A148C,#9C27B0)',
];
function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xFFFFFF;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0][0].toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

/* ── State ───────────────────────────────────────────────── */
let activeProject = null;   // { id, name, roomId, recordStatus, daysInStatus, repName }
let allProjects   = [];     // raw API data
let searchQuery   = '';

/* ── DOM refs ────────────────────────────────────────────── */
const viewList    = document.getElementById('view-list');
const viewChat    = document.getElementById('view-chat');
const backBtn     = document.getElementById('back-btn');
const chatList    = document.getElementById('chat-list');
const msgContent  = document.getElementById('messages-content');
const messagesArea= document.getElementById('messages-area');
const msgInput    = document.getElementById('msg-input');
const sendBtn     = document.getElementById('send-btn');
const typingEl    = document.getElementById('typing-indicator');
const headerAvatar= document.getElementById('chat-header-avatar');
const headerName  = document.getElementById('chat-header-name');
const headerStage = document.getElementById('chat-header-stage');
const searchInput = document.getElementById('search-input');
const refreshBtn  = document.getElementById('refresh-btn');
const refreshDot  = document.getElementById('refresh-dot');

/* ══════════════════════════════════════════════════════════
   LIST VIEW — Load & Render
══════════════════════════════════════════════════════════ */
const LIST_QUERY = `
  query ProjectList($mine: Boolean, $page: ID, $perPage: ID) {
    projects(mine: $mine, page: $page, perPage: $perPage) {
      projects {
        id
        jnid
        name
        recordStatus
        daysInStatus
        updatedAt
        contact { id name }
        user { id name }
        projectGeneralChatRoom {
          id
          lastMessage {
            content
            createdAt
            role
            aiAgent
            user { name }
          }
        }
        insuranceRoom    { id }
        constructionRoom { id }
        clientRoom       { id }
      }
    }
  }
`;


/* ── Smart Cache — instant load from localStorage, background refresh ── */
const CACHE_KEY = 'clarity_projects_cache';
const CACHE_TTL = 5 * 60 * 1000; // 5 min

function getCachedProjects() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { data, ts, userId } = JSON.parse(raw);
    if (currentUser && userId !== currentUser.id) return null; // different user
    if (Date.now() - ts > CACHE_TTL) return null; // expired
    return data;
  } catch { return null; }
}

function setCachedProjects(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      data,
      ts: Date.now(),
      userId: currentUser?.id
    }));
  } catch {}
}

async function loadProjects() {
  updateListHeader();

  // Show cached data instantly if available
  const cached = getCachedProjects();
  if (cached && cached.length) {
    allProjects = cached;
    renderList(allProjects);
    refreshDot.style.background = '#FF9500'; // orange = cached, refreshing
  } else {
    setListLoading();
  }

  // Fetch fresh data in background
  try {
    const mine = currentUser != null;
    const data = await gql(LIST_QUERY, { mine, page: "1", perPage: "50" });
    allProjects = data.projects.projects || [];
    setCachedProjects(allProjects);
    renderList(allProjects);
    refreshDot.style.background = '#34C759'; // green = fresh
  } catch (err) {
    if (!cached || !cached.length) {
      console.error('loadProjects:', err);
      setListError(err.message);
      refreshDot.style.background = '#FF3B30';
    }
    // If we had cache, keep showing it
  }
}

function updateListHeader() {
  const sub = document.getElementById('list-header-sub');
  if (sub) {
    sub.textContent = currentUser ? currentUser.name : '';
  }
}

function setListLoading() {
  chatList.innerHTML = `
    <div class="loading-state" id="list-loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading projects…</div>
    </div>`;
}

function setListError(msg) {
  chatList.innerHTML = `
    <div class="error-state">
      <div class="error-icon">⚠️</div>
      <div class="error-text">Couldn't load projects.<br><small style="color:#444">${msg}</small></div>
      <button class="retry-btn" id="retry-btn">Try Again</button>
    </div>`;
  document.getElementById('retry-btn')?.addEventListener('click', loadProjects);
}

function renderList(projects) {
  if (!projects.length) {
    chatList.innerHTML = `<div class="loading-state"><div class="loading-text">No projects found.</div></div>`;
    return;
  }

  chatList.innerHTML = '';
  const frag = document.createDocumentFragment();

  // Pinned projects float to the top
  const sorted = [...projects].sort((a, b) => {
    const aPinned = pinnedIds.has(a.id) ? 0 : 1;
    const bPinned = pinnedIds.has(b.id) ? 0 : 1;
    return aPinned - bPinned;
  });

  sorted.forEach(p => {
    const nm       = p.name?.trim() || 'Unknown';
    const stage    = p.recordStatus || '—';
    const sc       = stageColor(stage);
    const roomId   = p.projectGeneralChatRoom?.id || null;
    const lastMsg  = p.projectGeneralChatRoom?.lastMessage;
    const init     = initials(nm);
    const bg       = avatarColor(nm);
    const ts       = relativeTime(p.updatedAt);
    const repName  = p.user?.name || '';

    // Preview text
    let preview = '';
    if (lastMsg) {
      const plain = stripHtml(lastMsg.content);
      const sender = lastMsg.role === 'assistant' ? 'Clarity' : (lastMsg.user?.name || repName || 'You');
      preview = `${sender}: ${plain}`;
    } else {
      preview = `${stage} · ${p.daysInStatus || '0'} days`;
    }

    const pinned   = pinnedIds.has(p.id);
    const insRoomId = p.insuranceRoom?.id || '';
    const bldRoomId = p.constructionRoom?.id || '';
    const cliRoomId = p.clientRoom?.id || '';

    const item = document.createElement('div');
    item.className = 'chat-item' + (pinned ? ' pinned-item' : '');
    item.dataset.projectId    = p.id;
    item.dataset.jnid         = p.jnid || '';
    item.dataset.name         = nm;
    item.dataset.stage        = stage;
    item.dataset.statusColor  = sc;
    item.dataset.roomId       = roomId || '';
    item.dataset.insRoomId    = insRoomId;
    item.dataset.bldRoomId    = bldRoomId;
    item.dataset.cliRoomId    = cliRoomId;
    item.dataset.daysInStatus = p.daysInStatus || '0';
    item.dataset.repName      = repName;

    item.innerHTML = `
      <div class="chat-avatar" style="background:${bg}">
        <span>${init}</span>
        ${sc ? `<div class="chat-status ${sc}"></div>` : ''}
      </div>
      <div class="chat-content">
        <div class="chat-top-row">
          <span class="chat-name">${escHtml(nm)} — ${escHtml(stage)}</span>
          <span class="chat-time">${escHtml(ts)}</span>
        </div>
        <div class="chat-preview">${escHtml(preview.slice(0, 80))}</div>
      </div>
      <button class="pin-btn${pinned ? ' pinned' : ''}" data-project-id="${p.id}" title="${pinned ? 'Unpin' : 'Pin to top'}">
        📌
      </button>`;

    // Pin button — stop propagation so it doesn't open chat
    item.querySelector('.pin-btn').addEventListener('click', e => {
      e.stopPropagation();
      togglePin(p.id);
    });

    item.addEventListener('click', () => openChat(item));
    frag.appendChild(item);
  });

  chatList.appendChild(frag);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

`;

const MESSAGES_QUERY = `

async function openChat(item) {
  const name      = item.dataset.name;
  const stage     = item.dataset.stage;
  const sc        = item.dataset.statusColor;
  const roomId    = item.dataset.roomId;
  const days      = item.dataset.daysInStatus;
  const repName   = item.dataset.repName;
  const bg        = avatarColor(name);
  const init      = initials(name);

  activeProject = {
    id:         item.dataset.projectId,
    jnid:       item.dataset.jnid || '',
    name,
    stage,
    roomId,
    insRoomId:  item.dataset.insRoomId  || '',
    bldRoomId:  item.dataset.bldRoomId  || '',
    cliRoomId:  item.dataset.cliRoomId  || '',
    daysInStatus: days,
    repName,
    activeRoomId: roomId,
  };

  // Reset agent tab bar to CLARITY tab for project chats
  activeAgentTab = 'clarity';
  if (agentTabBar) {
    agentTabBar.style.display = '';
    agentTabBar.querySelectorAll('.agent-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === 'clarity');
    });
  }

  // Update header
  headerAvatar.style.background = bg;
  headerAvatar.textContent = init;
  headerName.textContent   = name;

  // Stage badge
  const stageColors = { green:'#34C759', amber:'#FF9500', red:'#FF3B30' };
  const dot = sc ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${stageColors[sc]};margin-right:4px;vertical-align:middle;"></span>` : '';
  headerStage.innerHTML = `${dot}${escHtml(stage)} · ${days}d`;

  // Slide in immediately
  viewList.classList.add('pushed');
  viewChat.classList.add('active');

  // Show loading state in messages area while fetching
  msgContent.innerHTML = '';
  typingEl.style.display = 'none';

  const projectId = item.dataset.projectId;
  showChatLoading();
  try {
    // Resolve the correct user-scoped room (same as app Clarity tab)
    const roomData = await gql(RESOLVE_ROOM_QUERY, { projectId: String(projectId) });
    const resolvedRoomId = roomData.projectGeneralChatRoom?.id;
    if (resolvedRoomId) {
      activeProject.roomId = resolvedRoomId;
      fetchMessages(resolvedRoomId);
    } else if (roomId) {
      fetchMessages(roomId);
    } else {
      showNoRoomState(name, stage, days);
    }
  } catch (err) {
    console.warn('resolveRoom failed:', err);
    if (roomId) { fetchMessages(roomId); }
    else { showNoRoomState(name, stage, days); }
  }
}

function showChatLoading() {
  msgContent.innerHTML = `
    <div class="chat-loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading conversation…</div>
    </div>`;
}

function showNoRoomState(name, stage, days) {
  msgContent.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:8px;">
      <div style="font-size:32px">💬</div>
      <div style="font-size:15px;font-weight:600;color:#fff">${escHtml(name)}</div>
      <div style="font-size:13px;color:#636366;text-align:center">${escHtml(stage)} · ${days} days<br>No Clarity conversation yet.</div>
    </div>`;
  requestAnimationFrame(() => requestAnimationFrame(() => scrollToBottom(false)));
}

async function fetchMessages(roomId) {
  try {
    const data = await gql(MESSAGES_QUERY, { roomId });
    const msgs = data.messages || [];
    renderMessages(msgs);
  } catch (err) {
    console.error('fetchMessages:', err);
    msgContent.innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠️</div>
        <div class="error-text">Couldn't load messages.<br><small style="color:#444">${err.message}</small></div>
      </div>`;
  }
}

function renderMessages(msgs) {
  msgContent.innerHTML = '';

  if (!msgs.length) {
    msgContent.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:8px;">
        <div style="font-size:32px">✦</div>
        <div style="font-size:13px;color:#636366;text-align:center">Start the conversation.<br>Ask Clarity anything about this project.</div>
      </div>`;
    requestAnimationFrame(() => requestAnimationFrame(() => scrollToBottom(false)));
    return;
  }

  // Messages come back newest-first from some APIs; sort oldest-first
  const sorted = [...msgs].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt) || Number(a.id) - Number(b.id));

  let lastTs   = null;
  let lastRole = null;

  sorted.forEach((msg, i) => {
    const role    = msg.role === 'assistant' ? 'received' : 'sent';
    const plain   = stripHtml(msg.content);
    if (!plain) return;

    // Date divider — show if first message or >30 min gap
    const msgDate = new Date(msg.createdAt);
    const showTs  = !lastTs || (msgDate - lastTs) > 30 * 60 * 1000;
    if (showTs) {
      const div = document.createElement('div');
      div.className = 'msg-ts-divider';
      div.textContent = formatMsgTs(msg.createdAt);
      msgContent.appendChild(div);
      lastTs = msgDate;
    }

    const isGroupGap = lastRole !== null && lastRole !== role && !showTs;
    const isLast     = i === sorted.length - 1 || (() => {
      // Is the next message of a different role or has a timestamp break?
      for (let j = i + 1; j < sorted.length; j++) {
        const next = sorted[j];
        if (!stripHtml(next.content)) continue;
        const nextRole = next.role === 'assistant' ? 'received' : 'sent';
        return nextRole !== role || (new Date(next.createdAt) - msgDate) > 30 * 60 * 1000;
      }
      return true;
    })();

    const row = document.createElement('div');
    row.className = `msg-row ${role}${isGroupGap ? ' group-gap' : ''}`;
    row.dataset.msgId = msg.id;

    if (role === 'received') {
      const av = document.createElement('div');
      av.className = 'msg-avatar' + (isLast ? '' : ' hidden');
      av.textContent = '✦';
      row.appendChild(av);
    }

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}${isLast ? ' tail' : ''}`;
    bubble.textContent = plain;
    row.appendChild(bubble);

    msgContent.appendChild(row);

    // Delivery receipt on last sent message
    if (role === 'sent' && isLast) {
      const dr = document.createElement('div');
      dr.className = 'delivery-row';
      dr.innerHTML = '<span class="delivery-receipt">Delivered</span>';
      msgContent.appendChild(dr);
    }

    lastRole = role;
  });

  requestAnimationFrame(() => requestAnimationFrame(() => scrollToBottom(false)));
}

/* ── Send message — real 2-way via createMessage mutation ─── */
const CREATE_MESSAGE_MUTATION = `
  mutation SendMessage($input: CreateMessageInput!) {
    createMessage(input: $input) {
      success
    }
  }
`;

let pollTimer = null;
let pollDeadline = null;
let lastKnownMsgId = null;   // track newest message before send

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !activeProject) return;
  if (!activeProject.roomId) {
    showToast('No chat room for this project yet.');
    return;
  }

  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.classList.add('inactive');

  // Clear empty-state if present
  const emptyEl = msgContent.querySelector('[style*="flex-direction:column"]');
  if (emptyEl) emptyEl.remove();

  // Optimistic sent bubble
  const row = document.createElement('div');
  row.className = 'msg-row sent group-gap';
  const bubble = document.createElement('div');
  bubble.className = 'bubble sent tail';
  bubble.textContent = text;
  row.appendChild(bubble);
  msgContent.appendChild(row);

  const dr = document.createElement('div');
  dr.className = 'delivery-row';
  dr.innerHTML = '<span class="delivery-receipt">Sending…</span>';
  msgContent.appendChild(dr);
  scrollToBottom();

  // Record the newest msg id we know about so we can detect the reply
  lastKnownMsgId = getMostRecentMsgId();

  try {
    await gql(CREATE_MESSAGE_MUTATION, {
      input: {
        roomId: activeProject.roomId,
        attributes: {
          content: text,
          role: 'user',
          skipAiResponse: false,
        }
      }
    });
    dr.innerHTML = '<span class="delivery-receipt">Delivered</span>';
    scrollToBottom();

    // Re-fetch all messages to get correct server-assigned order
    setTimeout(async () => {
      try {
        const data = await gql(MESSAGES_QUERY, { roomId: activeProject.roomId });
        const msgs = data.messages || [];
        if (msgs.length) renderMessages(msgs);
        scrollToBottom(false);
      } catch(e) { console.warn('post-send refetch:', e); }
    }, 500);

    // Start polling for Clarity's reply
    startPollingForReply(activeProject.roomId);

  } catch (err) {
    console.error('sendMessage:', err);
    dr.innerHTML = '<span class="delivery-receipt" style="color:#FF3B30">Failed to send</span>';
    scrollToBottom();
  }
}

function getMostRecentMsgId() {
  // Find the id of the most recently rendered message bubble
  const rows = msgContent.querySelectorAll('.msg-row[data-msg-id]');
  if (!rows.length) return null;
  return rows[rows.length - 1].dataset.msgId || null;
}

function startPollingForReply(roomId) {
  clearPolling();
  window._lastPollSnapshot = null;
  typingEl.style.display = 'flex';
  scrollToBottom();

  const sent = Date.now();
  const TIMEOUT = 45000;   // 45s max wait
  const INTERVAL = 2500;   // poll every 2.5s

  pollTimer = setInterval(async () => {
    if (Date.now() - sent > TIMEOUT) {
      clearPolling();
      typingEl.style.display = 'none';
      return;
    }
    try {
      const data = await gql(MESSAGES_QUERY, { roomId });
      const msgs = (data.messages || []).sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt) || Number(a.id) - Number(b.id));

      // Detect Clarity's response: either a new assistant message OR 
      // an existing one whose content changed (AI updates in-place)
      const currentSnapshot = msgs.map(m => m.id + ':' + (m.content || '').length).join('|');
      if (!window._lastPollSnapshot) window._lastPollSnapshot = currentSnapshot;
      
      const changed = currentSnapshot !== window._lastPollSnapshot;
      window._lastPollSnapshot = currentSnapshot;
      
      // Check if there's a substantial assistant reply (not just a placeholder)
      const hasSubstantialReply = msgs.some(m => 
        m.role === 'assistant' && (m.content || '').length > 50
      );
      
      if (changed && hasSubstantialReply) {
        clearPolling();
        typingEl.style.display = 'none';
        renderMessages(msgs);
        scrollToBottom();
      }
    } catch (e) {
      console.warn('poll error:', e);
    }
  }, INTERVAL);
}

function clearPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

/* ── Google Sign-In: decode JWT email → match IFC user ──── */
function decodeJwtPayload(token) {
  const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  return JSON.parse(atob(base64));
}

const USERS_QUERY = '{ users(scoreboard: false) { id name email } }';

window.handleGoogleCredential = async function(response) {
  setLoginLoading(true);
  hideLoginError();
  try {
    // 1. Decode the Google ID token to get email
    const payload = decodeJwtPayload(response.credential);
    const email = (payload.email || '').toLowerCase().trim();
    if (!email) throw new Error('No email in Google token');

    // 2. Fetch all IFC users and find by email
    const data = await gql(USERS_QUERY, {}, false);
    const users = data.users || [];
    const user = users.find(u => (u.email || '').toLowerCase().trim() === email);

    if (!user) throw new Error('not found');

    // 3. Save user (use X-User-Id auth, no platform token needed)
    saveUser({ id: user.id, name: user.name, email: user.email, token: 'user-id:' + user.id });
    enterApp();
  } catch (err) {
    console.error('Google SSO:', err);
    showLoginError(
      /not found/i.test(err.message)
        ? "Your Google account isn't linked to an IFC rep. Ask Oli to add you."
        : 'Sign-in failed. Try again.'
    );
    setLoginLoading(false);
  }
};

  try {
    const raw = localStorage.getItem(PINS_KEY);

    const tabLabels = { clarity: 'Clarity', insurance: 'Supplement', construction: 'Build', client: 'Calling', upgrade: 'Upgrade', order: 'Order' };
    msgContent.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:8px;">
        <div style="font-size:28px">💬</div>
        <div style="font-size:13px;color:#636366;text-align:center">No ${tabLabels[key] || key} conversation yet.</div>
      </div>`;
    requestAnimationFrame(() => requestAnimationFrame(() => scrollToBottom(false)));
  }
}

function getAgentRoomId(tab) {
  if (!activeProject) return null;
  switch (tab) {
    case 'clarity':      return activeProject.roomId || null;
    case 'insurance':    return activeProject.insRoomId || null;
    case 'construction':
    case 'order':        return activeProject.bldRoomId || null;
    case 'client':
    case 'upgrade':      return activeProject.cliRoomId || null;
    default:             return null;
  }
}

// Wire up tab click events
agentTabBar.addEventListener('click', e => {
  const btn = e.target.closest('.agent-tab');
  if (!btn) return;
  setActiveAgentTab(btn.dataset.tab);
});

// Override sendMessage to use the active tab's room
const _originalSendMessage = sendMessage;

// Patch activeProject.roomId usage in sendMessage to respect active tab
// (sendMessage already reads activeProject.roomId; we keep activeRoomId in sync)
function sendMessageOnActiveTab() {
  if (!activeProject) return;
  const roomId = getAgentRoomId(activeAgentTab);
  if (!roomId) {
    showToast('No chat room for this tab yet.');
    return;
  }
  // Temporarily override roomId so sendMessage uses the right room
  const saved = activeProject.roomId;
  activeProject.roomId = roomId;
  sendMessage();
  activeProject.roomId = saved;
}

// Re-bind send button and enter key to use tab-aware send
document.getElementById('send-btn').removeEventListener('click', sendMessage);
document.getElementById('send-btn').addEventListener('click', sendMessageOnActiveTab);
document.getElementById('msg-input').removeEventListener('keydown', () => {});

/* ── 4. Global agent chips ───────────────────────────────── */
// Map agent key → userGlobalChatRooms topic
const AGENT_ROOM_TOPICS = {
  clarity:  null,       // user's primary global clarity room (no topic / topic=null)
  mark:     'Mark',
  guide:    'Guide',
  feedback: 'IFC Feedback',
};

let globalRoomsCache = null;

async function loadGlobalRooms() {
  if (globalRoomsCache) return globalRoomsCache;
  try {
    const data = await gql('{ userGlobalChatRooms { id topic chatType } }');
    globalRoomsCache = data.userGlobalChatRooms || [];
    return globalRoomsCache;
  } catch (e) {
    return [];
  }
}

function findGlobalRoom(rooms, agent) {
  const topic = AGENT_ROOM_TOPICS[agent];
  if (topic === null) {
    // primary global clarity room — no topic or the first global_chat room
    return rooms.find(r => !r.topic || r.topic.toLowerCase().includes('clarity') || r.topic.toLowerCase().includes('global')) || rooms[0] || null;
  }
  return rooms.find(r => r.topic?.toLowerCase() === topic.toLowerCase()) || null;
}

document.querySelectorAll('.gallery-item.agent-clickable').forEach(chip => {

      statusColor: '',
      roomId: room?.id || '',
      insRoomId: '', bldRoomId: '', cliRoomId: '',
      daysInStatus: '',
      repName: '',
    }};

    // Hide agent tab bar for global chats (they don't have project room tabs)
    agentTabBar.style.display = 'none';

});

/* ══════════════════════════════════════════════════════════
   PIPELINE VIEW (IFC-656)
══════════════════════════════════════════════════════════ */

/* Pipeline stage buckets — ordered, canonical */
const PIPELINE_BUCKETS = [
  {
    label: 'Leads',
    color: 'amber',
    stages: ['LEADS','LEAD','Lead','CONTACTED','PRE-CALL','🔥🔥LEADS - NEEDS INSPECTION','Prospect'],
  },
  {
    label: 'Inspected',
    color: 'amber',
    stages: ['INSPECTED','🔥 Inspection Done','SCHEDULE REINSPECT'],
  },
  {
    label: 'Enough Damage',
    color: 'green',
    stages: ['ENOUGH DAMAGE','🔥🔥 Waiting for Storm Date / Enough Damage'],
  },
  {
    label: 'Adj / Post Mtg',
    color: 'amber',
    stages: ['ADJ SCHEDULED','POST ADJ. MEETING','INS. RESPONDED','❌ ADJ MTG done - NOT APPROVED'],
  },
  {
    label: 'Signed',
    color: 'green',
    stages: ['SIGNED','✅ Signed Contract'],
  },
  {
    label: 'Active',
    color: 'amber',
    stages: ['REP HANDS','OFFICE HANDS',"VANESSA'S HANDS","WILL'S HANDS","STETSON'S HANDS",'SUPP SENT','SUPP COMPLETED','✅ Finalize Scope 4 Install'],
  },
  {
    label: 'Billed',
    color: 'green',
    stages: ['BILLED','BILLED HOME','BILLED-BACKEND','💰 Paid (needs cap out)','💰💰 BILLING (👍 final RCV)','💰⏰ Billed Homeowner','💰 Submitted. Waiting on FIN RCV'],
  },
  {
    label: 'Capped',
    color: 'blue',
    stages: ['CAPPED','NEW ROOF','Membership Program','Before Bought'],
  },
  {
    label: 'PA / Legal',
    color: 'red',
    stages: ['PA-LAW','PA-LAW-APPRAISAL-EXPERT','PA-LAW-APPRAISAL','❌ Appraisal / PA /Attorney'],
  },
  {
    label: 'Lost / Closed',
    color: 'gray',
    stages: ['LOST','Lost','NOT ENOUGH DAMAGE','Dead','CSV Migrated','Past Clients','Completed Repairs (non Warranty)','Completed Repairs (IFC Warranty)','8. 👍 COMPLETE / CLOSED','Closed','Closed Out - COMPLETE','PAID / CLOSED','Completed','After Bought'],
  },
];

/* Build a lookup map: raw stage string → bucket index */
const STAGE_TO_BUCKET = new Map();
PIPELINE_BUCKETS.forEach((b, i) => {
  b.stages.forEach(s => STAGE_TO_BUCKET.set(s, i));
});

/* State */
let pipelineProjects  = [];   // all projects (paginated)
let pipelineLoaded    = false;
let pipelineLoading   = false;
let openBuckets       = new Set();  // which buckets are expanded

const viewPipeline = document.getElementById('view-pipeline');
const pipelineScrollable = document.getElementById('pipeline-scrollable');

/* ── Nav switching ───────────────────────────────────────── */
function showTab(tab) {
  // tab = 'messages' | 'pipeline'
  if (tab === 'messages') {
    viewList.style.display = '';
    viewPipeline.classList.remove('pipeline-active');
    // restore list nav active state
    document.querySelectorAll('#list-nav-messages, #list-nav-pipeline, #list-nav-app').forEach(el => el.classList.remove('active'));
    document.getElementById('list-nav-messages').classList.add('active');
  } else if (tab === 'pipeline') {
    viewList.style.display = 'none';
    viewPipeline.classList.add('pipeline-active');
    document.querySelectorAll('#pipeline-nav-messages, #pipeline-nav-pipeline, #pipeline-nav-app').forEach(el => el.classList.remove('active'));
    document.getElementById('pipeline-nav-pipeline').classList.add('active');
    if (!pipelineLoaded && !pipelineLoading) {
      loadPipelineProjects();
    }
  }
}

document.getElementById('list-nav-pipeline').addEventListener('click', () => showTab('pipeline'));
document.getElementById('pipeline-nav-messages').addEventListener('click', () => showTab('messages'));

/* ── Load ALL projects (paginated) ───────────────────────── */
const PIPELINE_LIST_QUERY = `
  query PipelineProjects($page: ID) {
    projects(perPage: "500", page: $page) {
      projects {
        id name recordStatus daysInStatus updatedAt
        user { id name }
        contact { id name }
        projectGeneralChatRoom { id lastMessage { content createdAt role user { name } } }
      }
      totalPages
    }
  }
`;

async function loadPipelineProjects() {
  if (pipelineLoading) return;
  pipelineLoading = true;
  pipelineScrollable.innerHTML = `
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading pipeline…</div>
    </div>`;

  try {
    // If we already loaded projects in the Messages tab, reuse them
    if (allProjects.length > 0 && allProjects.length >= 500) {
      // Paginate to get the rest
      pipelineProjects = [...allProjects];
    }

    // Always paginate fully for pipeline accuracy
    const all = [];
    let page = 1;
    let totalPages = 1;
    do {
      const data = await gql(PIPELINE_LIST_QUERY, { page: String(page) });
      all.push(...(data.projects.projects || []));
      totalPages = parseInt(data.projects.totalPages, 10);
      page++;
    } while (page <= totalPages && page <= 20);

    pipelineProjects = all;
    pipelineLoaded  = true;
    pipelineLoading = false;
    renderPipeline();
  } catch (err) {
    pipelineLoading = false;
    pipelineScrollable.innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠️</div>
        <div class="error-text">Couldn't load pipeline.<br><small style="color:#444">${err.message}</small></div>
        <button class="retry-btn" id="pipeline-retry-btn">Try Again</button>
      </div>`;
    document.getElementById('pipeline-retry-btn')?.addEventListener('click', loadPipelineProjects);
  }
}

/* ── Build pipeline data from projects ───────────────────── */
function buildPipelineData(projects) {
  const buckets = PIPELINE_BUCKETS.map(b => ({ ...b, projects: [] }));
  const unknown = [];

  projects.forEach(p => {
    const stage = p.recordStatus || 'Unknown';
    const idx   = STAGE_TO_BUCKET.get(stage);
    if (idx !== undefined) {
      buckets[idx].projects.push(p);
    } else if (stage !== 'Unknown') {
      unknown.push(p);
    }
  });

  return buckets;
}

/* ── Render Pipeline ─────────────────────────────────────── */
function renderPipeline() {
  const buckets = buildPipelineData(pipelineProjects);
  const total   = pipelineProjects.filter(p => p.recordStatus && p.recordType !== null).length;

  // KPI cards — active pipeline only (exclude lost/closed/unknown)
  const active = buckets.filter(b => b.label !== 'Lost / Closed').reduce((n, b) => n + b.projects.length, 0);
  const inspected  = buckets.find(b => b.label === 'Inspected')?.projects.length   || 0;
  const enoughDmg  = buckets.find(b => b.label === 'Enough Damage')?.projects.length || 0;
  const billed     = buckets.find(b => b.label === 'Billed')?.projects.length      || 0;
  const capped     = buckets.find(b => b.label === 'Capped')?.projects.length       || 0;
  const paLegal    = buckets.find(b => b.label === 'PA / Legal')?.projects.length   || 0;

  // Max count (for bar scaling) — among active buckets
  const activeBuckets = buckets.filter(b => b.label !== 'Lost / Closed');
  const maxCount = Math.max(...activeBuckets.map(b => b.projects.length), 1);

  const html = [];

  // KPI row
  html.push(`<div class="kpi-row">`);
  html.push(kpiCard('Active', active.toLocaleString(), 'projects', 'blue'));
  html.push(kpiCard('Inspected', inspected, 'awaiting adj', 'amber'));
  html.push(kpiCard('Enough Dmg', enoughDmg, 'ready to file', 'green'));
  html.push(kpiCard('Billed', billed, 'collecting', 'green'));
  html.push(kpiCard('Capped', capped, 'complete', 'blue'));
  if (paLegal > 0) html.push(kpiCard('PA / Legal', paLegal, 'escalated', 'red'));
  html.push(`</div>`);

  // Divider
  html.push(`
    <div class="pipeline-section-header">
      <div class="pipeline-section-title">All Stages</div>
      <div class="pipeline-total">${pipelineProjects.length.toLocaleString()} projects</div>
    </div>`);

  // Bucket rows
  buckets.forEach((bucket, i) => {
    const count    = bucket.projects.length;
    if (count === 0) return;
    const barPct   = bucket.label === 'Lost / Closed'
      ? 100
      : Math.round((count / maxCount) * 100);
    const isOpen   = openBuckets.has(i);
    const colorClass = bucket.color;

    html.push(`<div class="stage-bucket${isOpen ? ' open' : ''}" data-bucket-idx="${i}">`);
    html.push(`
      <div class="bucket-row">
        <div class="bucket-left">
          <div class="bucket-name">${escHtml(bucket.label)}</div>
          <div class="bucket-bar-wrap">
            <div class="bucket-bar ${colorClass}" style="width:${barPct}%"></div>
          </div>
        </div>
        <div class="bucket-count ${colorClass}">${count}</div>
        <div class="bucket-chevron">›</div>
      </div>`);

    // Project list (top 20, expand to see all)
    html.push(`<div class="bucket-projects">`);
    const sorted  = [...bucket.projects].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    const preview = sorted.slice(0, 20);
    const more    = sorted.length - 20;

    preview.forEach(p => {
      const nm   = (p.name || 'Unknown').trim();
      const bg   = avatarColor(nm);
      const init = initials(nm);
      const rep  = p.user?.name ? `${escHtml(p.user.name)} · ` : '';
      const days = p.daysInStatus || '0';
      html.push(`
        <div class="bucket-project-item" data-project-id="${escHtml(p.id)}" data-room-id="${escHtml(p.projectGeneralChatRoom?.id || '')}" data-name="${escHtml(nm)}" data-stage="${escHtml(p.recordStatus || '')}" data-days="${escHtml(days)}" data-rep="${escHtml(p.user?.name || '')}">
          <div class="bp-avatar" style="background:${bg}">${init}</div>
          <div class="bp-info">
            <div class="bp-name">${escHtml(nm)}</div>
            <div class="bp-meta">${rep}${escHtml(p.recordStatus || '—')}</div>
          </div>
          <div class="bp-days">${days}d</div>
        </div>`);
    });

    if (more > 0) {
      html.push(`<div class="bucket-show-more" data-bucket-idx="${i}" data-show-all="false">+ ${more} more</div>`);
    }

    html.push(`</div>`); // .bucket-projects
    html.push(`</div>`); // .stage-bucket
  });

  pipelineScrollable.innerHTML = html.join('');

  // Wire up bucket expand/collapse
  pipelineScrollable.querySelectorAll('.stage-bucket').forEach(el => {
    el.querySelector('.bucket-row').addEventListener('click', () => {
      const idx = parseInt(el.dataset.bucketIdx, 10);
      if (openBuckets.has(idx)) {
        openBuckets.delete(idx);
        el.classList.remove('open');
      } else {
        openBuckets.add(idx);
        el.classList.add('open');
      }
    });
  });

  // Wire up "show more"
  pipelineScrollable.querySelectorAll('.bucket-show-more').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx    = parseInt(btn.dataset.bucketIdx, 10);
      const bucket = buildPipelineData(pipelineProjects)[idx];
      const sorted = [...bucket.projects].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      const container = btn.parentElement;
      btn.remove();
      sorted.slice(20).forEach(p => {
        const nm   = (p.name || 'Unknown').trim();
        const bg   = avatarColor(nm);
        const init = initials(nm);
        const rep  = p.user?.name ? `${escHtml(p.user.name)} · ` : '';
        const days = p.daysInStatus || '0';
        const item = document.createElement('div');
        item.className = 'bucket-project-item';
        item.dataset.projectId = p.id;
        item.dataset.roomId    = p.projectGeneralChatRoom?.id || '';
        item.dataset.name      = nm;
        item.dataset.stage     = p.recordStatus || '';
        item.dataset.days      = days;
        item.dataset.rep       = p.user?.name || '';
        item.innerHTML = `
          <div class="bp-avatar" style="background:${bg}">${init}</div>
          <div class="bp-info">
            <div class="bp-name">${escHtml(nm)}</div>
            <div class="bp-meta">${rep}${escHtml(p.recordStatus || '—')}</div>
          </div>
          <div class="bp-days">${days}d</div>`;
        container.appendChild(item);
        item.addEventListener('click', () => openProjectFromPipeline(item));
      });
    });
  });

  // Wire up project taps → open chat
  pipelineScrollable.querySelectorAll('.bucket-project-item').forEach(item => {
    item.addEventListener('click', () => openProjectFromPipeline(item));
  });
}

function kpiCard(label, value, sub, color) {
  return `<div class="kpi-card ${color}">
    <div class="kpi-value">${value}</div>
    <div class="kpi-label">${label}</div>
    <div class="kpi-sub">${sub}</div>
  </div>`;
}

/* ── Open project from Pipeline → jump to chat ───────────── */
function openProjectFromPipeline(item) {
  const name    = item.dataset.name;
  const stage   = item.dataset.stage;
  const roomId  = item.dataset.roomId;
  const days    = item.dataset.days;
  const rep     = item.dataset.rep;
  const sc      = stageColor(stage);

  // Switch to messages tab first (so back chevron shows Clarity)
  showTab('messages');

  // Then open chat — synthesise a fake dataset element
  const fake = { dataset: {
    projectId: item.dataset.projectId,
    name, stage,
    statusColor: sc,
    roomId: roomId || '',
    daysInStatus: days,
    repName: rep,
  }};
  openChat(fake);
}
