<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clarity</title>

<!-- PWA Meta -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clarity">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<style>
/* ─── Reset ─────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #000; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: none;
}

/* ─── App Shell ─────────────────────────────────────────── */
#app {
  position: relative;
  width: 100%;
  max-width: 430px;
  height: 100dvh;
  margin: 0 auto;
  overflow: hidden;
  background: #000;
}

/* ─── View System ───────────────────────────────────────── */
.view {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: #000;
  will-change: transform;
  transition: transform 0.34s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
#view-list { transform: translateX(0); z-index: 1; }
#view-list.pushed { transform: translateX(-28%); pointer-events: none; }
#view-chat { transform: translateX(100%); z-index: 2; }
#view-chat.active { transform: translateX(0); }

/* ─── Status Bar (browser only) ─────────────────────────── */
.status-bar { display: none !important; 
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 20px 4px;
  font-size: 14px; font-weight: 600;
  flex-shrink: 0;
}
@media all and (display-mode: standalone) { .status-bar { display: none !important;  display: none; } }

/* ─── Tab System ─────────────────────────────────────────── */
.tab-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
.tab-content.tab-hidden { display: none; }

/* ─── List View: Header ─────────────────────────────────── */
.list-header { flex-shrink: 0; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 20px 12px;
}
.header-title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.header-btn {
  width: 32px; height: 32px;
  border-radius: 50%; background: #1c1c1e;
  border: none; color: #007AFF; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}

/* ─── Search ─────────────────────────────────────────────── */
.search-bar { padding: 0 16px 12px; }
.search-input {
  width: 100%; background: #1c1c1e; border: none;
  border-radius: 10px; padding: 10px 16px;
  color: #fff; font-size: 15px; font-family: inherit; outline: none;
}
.search-input::placeholder { color: #636366; }

/* ─── List Scrollable ────────────────────────────────────── */
.list-scrollable { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.list-scrollable::-webkit-scrollbar { display: none; }

/* ─── Gallery ────────────────────────────────────────────── */
.gallery-section { padding: 0 8px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.gallery-section::-webkit-scrollbar { display: none; }
.gallery-scroll { display: flex; gap: 4px; padding: 0 8px; min-width: min-content; }
.gallery-item {
  display: flex; flex-direction: column; align-items: center;
  width: 80px; flex-shrink: 0; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.gallery-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #fff;
  margin-bottom: 6px; position: relative; overflow: visible;
  transition: transform 0.15s;
}
.gallery-avatar:active { transform: scale(0.92); }
.gallery-avatar.clarity  { background: linear-gradient(135deg, #00305C, #0054A0); }
.gallery-avatar.mark     { background: linear-gradient(135deg, #1B6B3A, #2DA05A); }
.gallery-avatar.guide    { background: linear-gradient(135deg, #8B4513, #C6772E); }
.gallery-avatar.feedback { background: linear-gradient(135deg, #7B1FA2, #AB47BC); }
.gallery-avatar.sub { width: 56px; height: 56px; font-size: 14px; background: #1c1c1e; border: 2px solid #333; }
.gallery-label { font-size: 11px; color: #8e8e93; text-align: center; max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gallery-badge {
  position: absolute; top: -2px; right: -2px;
  background: #007AFF; color: #fff;
  font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
  border-radius: 9px; display: flex; align-items: center; justify-content: center;
  padding: 0 4px; border: 2px solid #000;
}

/* ─── Section ────────────────────────────────────────────── */
.divider { height: 1px; background: #1c1c1e; margin: 4px 20px 8px; }
.section-label { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 20px; }

/* ─── Chat List ──────────────────────────────────────────── */
.chat-list { padding: 0; }
.chat-item {
  display: flex; align-items: center;
  padding: 12px 20px; gap: 12px;
  cursor: pointer; position: relative;
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.chat-item:active { background: #1a1a1a; }
.chat-item + .chat-item { border-top: 1px solid rgba(255,255,255,0.05); }
.chat-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: #1c1c1e;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff;
  flex-shrink: 0; position: relative;
}
.chat-status { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid #000; }
.chat-status.green { background: #34C759; }
.chat-status.amber { background: #FF9500; }
.chat-status.red   { background: #FF3B30; }
.chat-content { flex: 1; min-width: 0; }
.chat-top-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.chat-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; margin-right: 6px; }
.chat-time { font-size: 13px; color: #8e8e93; flex-shrink: 0; }
.chat-preview { font-size: 14px; color: #8e8e93; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-pin { color: #FF9500; font-size: 11px; margin-left: 3px; }
.list-spacer { height: 16px; }

/* ─── Loading / Skeleton ─────────────────────────────────── */
.loading-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 24px; gap: 12px;
}
.loading-spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2.5px solid #1c1c1e; border-top-color: #007AFF;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: #636366; }

.error-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 24px; gap: 12px;
}
.error-icon { font-size: 32px; }
.error-text { font-size: 14px; color: #636366; text-align: center; }
.retry-btn {
  margin-top: 8px; padding: 8px 20px; border-radius: 20px;
  background: #1c1c1e; border: none; color: #007AFF;
  font-size: 15px; font-family: inherit; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* ─── Refresh indicator ──────────────────────────────────── */
.refresh-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #34C759;
  flex-shrink: 0; animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ─── Bottom Nav ─────────────────────────────────────────── */
.bottom-nav {
  flex-shrink: 0;
  background: rgba(0,0,0,0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid #1c1c1e;
  display: flex; justify-content: space-around;
  padding: 8px 0 env(safe-area-inset-bottom, 20px);
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #636366; font-size: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: color 0.15s; }
.nav-item.active { color: #007AFF; }
.nav-icon { font-size: 22px; }

/* ══════════════════════════════════════════════════════════ */
/*  PIPELINE TAB                                             */
/* ══════════════════════════════════════════════════════════ */

.pipeline-scrollable {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 12px 16px 24px;
}
.pipeline-scrollable::-webkit-scrollbar { display: none; }

/* ─── Summary Card ───────────────────────────────────────── */
.pipeline-summary-card {
  background: #0d0d0d; border: 1px solid #1c1c1e; border-radius: 16px;
  padding: 18px 8px 16px;
  display: flex; gap: 0;
  margin-bottom: 20px;
}
.pipeline-stat {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.pipeline-stat + .pipeline-stat { border-left: 1px solid #1c1c1e; }
.pipeline-stat-value {
  font-size: 28px; font-weight: 700; letter-spacing: -1px; line-height: 1;
  color: #fff;
}
.pipeline-stat-value.blue  { color: #007AFF; }
.pipeline-stat-value.green { color: #34C759; }
.pipeline-stat-value.amber { color: #FF9500; }
.pipeline-stat-value.red   { color: #FF3B30; }
.pipeline-stat-label {
  font-size: 10px; color: #636366; text-transform: uppercase;
  letter-spacing: 0.5px; text-align: center; line-height: 1.3;
}

/* ─── Stage Cards ────────────────────────────────────────── */
.pipeline-section-label {
  font-size: 11px; font-weight: 600; color: #636366;
  text-transform: uppercase; letter-spacing: 0.6px;
  padding: 0 4px 10px;
}

.stage-card {
  background: #0a0a0a; border: 1px solid #1c1c1e; border-radius: 14px;
  margin-bottom: 8px; overflow: hidden;
  transition: border-color 0.2s;
}
.stage-card.expanded { border-color: #2c2c2e; }

.stage-header {
  display: flex; align-items: center; padding: 13px 16px; gap: 12px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.stage-header:active { background: rgba(255,255,255,0.03); }

.stage-color-bar {
  width: 4px; min-height: 36px; border-radius: 2px; flex-shrink: 0;
  align-self: stretch;
}
.stage-color-bar.green { background: linear-gradient(180deg, #30D158, #25A244); }
.stage-color-bar.amber { background: linear-gradient(180deg, #FF9F0A, #CC7A00); }
.stage-color-bar.red   { background: linear-gradient(180deg, #FF453A, #CC2218); }

.stage-info { flex: 1; min-width: 0; }
.stage-name { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stage-meta { font-size: 12px; color: #636366; }

.stage-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.stage-badge {
  background: #1c1c1e; font-size: 13px; font-weight: 700;
  min-width: 28px; height: 28px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center; padding: 0 8px;
  flex-shrink: 0;
}
.stage-badge.green { background: rgba(52,199,89,0.15); color: #34C759; }
.stage-badge.amber { background: rgba(255,159,10,0.15); color: #FF9F0A; }
.stage-badge.red   { background: rgba(255,69,58,0.15);  color: #FF453A; }

.stage-chevron {
  color: #48484a; font-size: 12px;
  transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  flex-shrink: 0;
}
.stage-card.expanded .stage-chevron { transform: rotate(90deg); }

/* ─── Expandable Project List ────────────────────────────── */
.stage-projects {
  max-height: 0; overflow: hidden;
  transition: max-height 0.32s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.stage-card.expanded .stage-projects { max-height: 3000px; }
.stage-divider { height: 1px; background: #1a1a1a; margin: 0 16px; }

.project-row {
  display: flex; align-items: center; padding: 10px 16px; gap: 12px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.12s;
}
.project-row:active { background: rgba(255,255,255,0.04); }
.project-row + .project-row { border-top: 1px solid rgba(255,255,255,0.04); }

.project-avatar-sm {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.project-info { flex: 1; min-width: 0; }
.project-name { font-size: 14px; font-weight: 500; color: #e5e5ea; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-sub  { font-size: 11px; color: #636366; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-days-badge {
  font-size: 12px; font-weight: 600; flex-shrink: 0;
  padding: 3px 8px; border-radius: 10px;
}
.project-days-badge.green { background: rgba(52,199,89,0.12);  color: #30D158; }
.project-days-badge.amber { background: rgba(255,159,10,0.12); color: #FF9F0A; }
.project-days-badge.red   { background: rgba(255,69,58,0.12);  color: #FF453A; }

/* ─── Pipeline loading ───────────────────────────────────── */
#pipeline-loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 24px; gap: 14px;
}

/* ══════════════════════════════════════════════════════════ */
/*  CHAT VIEW                                                 */
/* ══════════════════════════════════════════════════════════ */

/* Nav bar */
.chat-nav-header {
  flex-shrink: 0;
  display: flex; align-items: center;
  padding: 10px 12px;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  min-height: 56px; gap: 4px;
}
.back-btn {
  display: flex; align-items: center; gap: 2px;
  background: none; border: none; color: #007AFF;
  cursor: pointer; padding: 6px 8px 6px 0;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.back-btn:active { opacity: 0.55; }
.back-label { font-size: 17px; color: #007AFF; font-weight: 400; }

.chat-contact-block {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 1px; min-width: 0;
}
.chat-contact-avatar-sm {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
  flex-shrink: 0; margin-bottom: 1px;
}
.chat-contact-name-sm {
  font-size: 15px; font-weight: 600; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 180px; line-height: 1.2;
}
.chat-contact-stage-sm {
  font-size: 11px; font-weight: 500; color: #8e8e93;
  letter-spacing: 0.1px; white-space: nowrap;
}
.chat-info-btn {
  background: none; border: none; color: #007AFF; font-size: 20px;
  cursor: pointer; padding: 6px 0 6px 8px;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.chat-info-btn:active { opacity: 0.55; }

/* Messages area */
.messages-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 8px 12px 4px; scroll-behavior: smooth;
}
.messages-area::-webkit-scrollbar { display: none; }
#messages-content { display: flex; flex-direction: column; }

/* Date divider */
.msg-ts-divider {
  text-align: center; font-size: 12px; color: #636366; font-weight: 500;
  padding: 14px 0 10px; letter-spacing: 0.05px; flex-shrink: 0;
}

/* Message row */
.msg-row {
  display: flex; align-items: flex-end; gap: 6px; flex-shrink: 0;
}
.msg-row + .msg-row { margin-top: 2px; }
.msg-row.group-gap { margin-top: 10px; }
.msg-row.sent { justify-content: flex-end; }
.msg-row.received { justify-content: flex-start; }

/* Small avatar for received side */
.msg-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, #00305C, #0054A0);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; color: #fff;
  flex-shrink: 0; align-self: flex-end; letter-spacing: -0.5px;
}
.msg-avatar.hidden { visibility: hidden; }

/* Bubble */
.bubble {
  max-width: min(72%, 290px);
  padding: 9px 14px; font-size: 15px; line-height: 1.45;
  word-break: break-word; white-space: pre-wrap;
}
.bubble.sent { background: #00305C; color: #fff; border-radius: 18px; align-self: flex-end; }
.bubble.sent.tail { border-radius: 18px 18px 5px 18px; }
.bubble.received { background: #1c1c1e; color: #fff; border-radius: 18px; align-self: flex-start; }
.bubble.received.tail { border-radius: 18px 18px 18px 5px; }

/* Delivery receipt */
.delivery-row { display: flex; justify-content: flex-end; padding: 1px 4px 6px; flex-shrink: 0; }
.delivery-receipt { font-size: 11.5px; color: #636366; }

/* Typing indicator */
#typing-indicator {
  display: none; align-items: flex-end; gap: 6px;
  margin-top: 10px; flex-shrink: 0;
}
.typing-bubble {
  background: #1c1c1e; border-radius: 18px 18px 18px 5px;
  padding: 10px 14px; display: flex; align-items: center; gap: 4px; height: 36px;
}
.typing-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #636366;
  animation: typingPulse 1.4s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: 0.18s; }
.typing-dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes typingPulse {
  0%, 70%, 100% { transform: scale(0.75); opacity: 0.35; }
  35%            { transform: scale(1.1);  opacity: 1; }
}

/* Chat loading */
.chat-loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 10px;
}
.chat-loading .loading-spinner { border-top-color: #007AFF; }
.chat-loading .loading-text { font-size: 13px; color: #636366; }

/* Input area */
.input-area {
  flex-shrink: 0;
  background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.07);
  padding: 8px 12px calc(8px + env(safe-area-inset-bottom, 16px));
}
.input-row { display: flex; align-items: flex-end; gap: 8px; }
.input-plus-btn {
  width: 32px; height: 32px; border-radius: 50%; background: #1c1c1e; border: none;
  color: #007AFF; font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  transition: opacity 0.12s;
}
.input-plus-btn:active { opacity: 0.6; }
.input-field-wrap {
  flex: 1; background: #1c1c1e; border-radius: 20px;
  padding: 7px 14px;
  display: flex; align-items: flex-end; min-height: 34px;
}
.input-field {
  width: 100%; background: none; border: none; outline: none;
  color: #fff; font-size: 15px; font-family: inherit; line-height: 1.4;
  resize: none; max-height: 96px; overflow-y: auto; display: block;
}
.input-field::placeholder { color: #636366; }
.input-field::-webkit-scrollbar { display: none; }
.send-btn {
  width: 32px; height: 32px; border-radius: 50%; background: #007AFF;
  border: none; color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, opacity 0.15s, transform 0.1s;
}
.send-btn:active { transform: scale(0.88); }
.send-btn.inactive { background: #2c2c2e; opacity: 0.5; pointer-events: none; }
.send-btn.sending  { background: #005EC4; opacity: 0.7; pointer-events: none; }

/* ══════════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════════ */
#view-login {
  position: absolute; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #000;
  padding: 48px 32px env(safe-area-inset-bottom, 24px);
  transition: opacity 0.3s, transform 0.3s;
}
#view-login.dismissed {
  opacity: 0; transform: translateY(-24px); pointer-events: none;
}
.login-logo {
  font-size: 56px; margin-bottom: 4px;
  background: linear-gradient(135deg, #007AFF, #5AC8FA);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.login-title {
  font-size: 32px; font-weight: 700; letter-spacing: -0.5px;
  color: #fff; margin-bottom: 6px;
}
.login-sub {
  font-size: 15px; color: #8e8e93; margin-bottom: 48px; text-align: center; line-height: 1.5;
}
.login-form { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
.login-field {
  background: #1c1c1e; border: 1.5px solid #2c2c2e; border-radius: 12px;
  padding: 14px 18px; color: #fff; font-size: 16px;
  font-family: inherit; outline: none; width: 100%;
  transition: border-color 0.2s;
}
.login-field:focus { border-color: #007AFF; }

<script>
/* ═══════════════════════════════════════════════════════════
   Clarity PWA — Phase 4: Full 2-way Clarity Connection (IFC-667)
   Phase 3: Pipeline Tab (IFC-656)
   Phase 2: Live IFC API Integration (IFC-655)
   Phase 1: Chat View (IFC-653)
═══════════════════════════════════════════════════════════ */

const GQL = '/api/graphql';

/* ── Auth state ──────────────────────────────────────────── */
let currentUserId   = null;   // X-User-Id header value
let currentUserName = null;   // display name

/* ── GraphQL fetch helper ────────────────────────────────── */
async function gql(query, variables = {}, userId = currentUserId) {
  const headers = { 'Content-Type': 'application/json' };
  if (userId) headers['X-User-Id'] = userId;
  const res = await fetch(GQL, {
    method: 'POST',
    headers,
    body: JSON.stringify({ query, variables }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.errors?.length) throw new Error(json.errors[0].message);
  return json.data;
}

/* ── HTML → plain text ───────────────────────────────────── */
function stripHtml(html) {
  if (!html) return '';
  let text = html
    .replace(/<div class="inline-actions-container">[\s\S]*?<\/div>/gi, '')
    .replace(/<sup class="cite-marker"[^>]*>.*?<\/sup>/gi, '')
    .replace(/<[^>]+>/g, ' ')
    .replace(/\s{2,}/g, ' ')
    .trim();
  const ta = document.createElement('textarea');
  ta.innerHTML = text;
  return ta.value.trim();
}

/* ── Escape HTML ─────────────────────────────────────────── */
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Relative timestamp ──────────────────────────────────── */
function relativeTime(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const diffDays = Math.floor((Date.now() - d) / 86400000);
  if (diffDays === 0) return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  if (diffDays === 1) return 'Yesterday';
  if (diffDays < 7)  return d.toLocaleDateString('en-US', { weekday: 'short' });
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

/* ── Format message timestamp dividers ───────────────────── */
function formatMsgTs(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const diffDays = Math.floor((Date.now() - d) / 86400000);
  const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  if (diffDays === 0) return `Today ${time}`;
  if (diffDays === 1) return `Yesterday ${time}`;
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ` · ${time}`;
}

/* ── Stage → status color ────────────────────────────────── */
const STATUS_GREEN = new Set(['INSPECTED','ENOUGH DAMAGE','APPROVED','SUPP COMPLETED','BILLED',
  'COLLECTED','INSTALL COMPLETE','BILLED-BACKEND','INSTALL SCHEDULED']);
const STATUS_RED   = new Set(['LOST','DEAD','PA-LAW','CANCELLED','NO DAMAGE','DISPUTED']);
function stageColor(stage) {
  if (!stage) return 'amber';
  const s = stage.toUpperCase();
  if (STATUS_GREEN.has(s)) return 'green';
  if (STATUS_RED.has(s))   return 'red';
  return 'amber';
}

/* ── Canonical pipeline stage order ─────────────────────── */
const STAGE_ORDER = [
  'LEAD','INSPECTED','ENOUGH DAMAGE','ADJ SCHEDULED','APPROVED',
  'SUPP SENT','SUPP COMPLETED','INSTALL SCHEDULED','INSTALL COMPLETE',
  'BILLED','BILLED-BACKEND','COLLECTED',
  // Terminal / attention
  'LOST','DEAD','NO DAMAGE','CANCELLED','PA-LAW','DISPUTED',
];
function stageRank(s) {
  const idx = STAGE_ORDER.indexOf((s||'').toUpperCase());
  return idx === -1 ? 99 : idx;
}

/* ── Avatar gradient palette ─────────────────────────────── */
const AVATAR_COLORS = [
  'linear-gradient(135deg,#003366,#0066CC)',
  'linear-gradient(135deg,#1B6B3A,#2DA05A)',
  'linear-gradient(135deg,#7B1FA2,#AB47BC)',
  'linear-gradient(135deg,#8B4513,#C6772E)',
  'linear-gradient(135deg,#B71C1C,#E53935)',
  'linear-gradient(135deg,#1565C0,#42A5F5)',
  'linear-gradient(135deg,#2E7D32,#66BB6A)',
  'linear-gradient(135deg,#4A148C,#9C27B0)',
];
function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xFFFFFF;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return parts.length === 1
    ? parts[0][0].toUpperCase()
    : (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

/* ── State ───────────────────────────────────────────────── */
let activeProject      = null;
let allProjects        = [];
let searchQuery        = '';
let activeTab          = 'messages'; // 'messages' | 'pipeline'
let pipelineLoaded     = false;
let pollInterval       = null;   // AI response polling handle
let lastKnownMsgId     = null;   // track latest message id to detect new AI response
let sendPending        = false;  // guard against double-sends

/* ── DOM refs ────────────────────────────────────────────── */
const viewLogin      = document.getElementById('view-login');
const loginUserIdEl  = document.getElementById('login-user-id');
const loginPasswordEl= document.getElementById('login-password');
const loginBtn       = document.getElementById('login-btn');
const loginError     = document.getElementById('login-error');
const viewList       = document.getElementById('view-list');
const viewChat       = document.getElementById('view-chat');
const backBtn        = document.getElementById('back-btn');
const chatList       = document.getElementById('chat-list');
const msgContent     = document.getElementById('messages-content');
const messagesArea   = document.getElementById('messages-area');

const typingEl       = document.getElementById('typing-indicator');

const headerName     = document.getElementById('chat-header-name');
const headerStage    = document.getElementById('chat-header-stage');

const refreshDot     = document.getElementById('refresh-dot');
const pipelineRefreshBtn = document.getElementById('pipeline-refresh-btn');
const pipelineRefreshDot = document.getElementById('pipeline-refresh-dot');
const tabMessages    = document.getElementById('tab-messages');
const tabPipeline    = document.getElementById('tab-pipeline');
const hdrMessages    = document.getElementById('hdr-messages');
const hdrPipeline    = document.getElementById('hdr-pipeline');
const navMessages    = document.getElementById('nav-messages');
const navPipeline    = document.getElementById('nav-pipeline');
const navIfc         = document.getElementById('nav-ifc');

/* ══════════════════════════════════════════════════════════
   TAB NAVIGATION
══════════════════════════════════════════════════════════ */
function switchTab(tab) {
  if (activeTab === tab) return;
  activeTab = tab;

  if (tab === 'messages') {
    tabMessages.classList.remove('tab-hidden');
    tabPipeline.classList.add('tab-hidden');
    hdrMessages.style.display = '';
    hdrPipeline.style.display = 'none';
    navMessages.classList.add('active');
    navPipeline.classList.remove('active');
  } else if (tab === 'pipeline') {
    tabMessages.classList.add('tab-hidden');
    tabPipeline.classList.remove('tab-hidden');
    hdrMessages.style.display = 'none';
    hdrPipeline.style.display = '';
    navPipeline.classList.add('active');
    navMessages.classList.remove('active');
    // Load pipeline data if not yet loaded (or share allProjects)
    if (!pipelineLoaded) {
      renderPipeline(allProjects.length ? allProjects : null);
    }
  }
  navIfc.classList.remove('active');
}

navMessages.addEventListener('click', () => switchTab('messages'));
navPipeline.addEventListener('click', () => switchTab('pipeline'));
navIfc.addEventListener('click', () => {
  window.open('https://app.ifcroofing.com', '_blank');
});

/* ══════════════════════════════════════════════════════════
   LOGIN — Auth / Session Management
══════════════════════════════════════════════════════════ */
const ME_QUERY = `
  query Me {
    me {
      id
      name
      email
    }
  }
`;

async function tryRestoreSession() {
  const saved = sessionStorage.getItem('clarity_user');
  if (!saved) return false;
  try {
    const { id, name } = JSON.parse(saved);
    if (!id) return false;
    /* Validate the saved session against the API */
    const data = await gql(ME_QUERY, {}, id);
    const me = data?.me;
    if (!me?.id) return false;
    currentUserId   = me.id;
    currentUserName = me.name || name;
    return true;
  } catch {
    sessionStorage.removeItem('clarity_user');
    return false;
  }
}

function showLogin() {
  viewLogin.classList.remove('dismissed');
}

function dismissLogin() {
  viewLogin.classList.add('dismissed');
}

async function doLogin() {
  const userId   = loginUserIdEl.value.trim();
  const password = loginPasswordEl.value.trim(); // forwarded via nginx / handled server-side
  loginError.textContent = '';

  if (!userId) {
    loginError.textContent = 'Please enter your User ID.';
    return;
  }

  loginBtn.disabled   = true;
  loginBtn.innerHTML  = '<div class="login-spinner"></div>';

  try {
    /* Validate credentials: POST to graphql with X-User-Id, fetch me */
    const headers = { 'Content-Type': 'application/json', 'X-User-Id': userId };
    if (password) headers['X-User-Password'] = password;

    const res = await fetch(GQL, {
      method: 'POST',
      headers,
      body: JSON.stringify({ query: ME_QUERY }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.errors?.length) throw new Error(json.errors[0].message);
    const me = json.data?.me;
    if (!me?.id) throw new Error('Invalid credentials — user not found.');

    currentUserId   = me.id;
    currentUserName = me.name || userId;

    sessionStorage.setItem('clarity_user', JSON.stringify({ id: currentUserId, name: currentUserName }));

    /* Update header title with user name */
    const hTitle = document.querySelector('#hdr-messages .header-title');
    if (hTitle) hTitle.textContent = 'Clarity';

    dismissLogin();
    loadProjects();

  } catch (err) {
    loginError.textContent = err.message || 'Sign-in failed. Try again.';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Sign In';
  }
}

loginBtn.addEventListener('click', doLogin);
loginUserIdEl.addEventListener('keydown', e => { if (e.key === 'Enter') loginPasswordEl.focus(); });
loginPasswordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

/* ══════════════════════════════════════════════════════════
   LIST VIEW — Load & Render (Messages Tab)
══════════════════════════════════════════════════════════ */
const LIST_QUERY = `
  query ProjectList {
    projects(mine: true) {
      projects {
        id
        name
        recordStatus
        daysInStatus
        updatedAt
        contact { id name }
        user { id name }
        projectGeneralChatRoom {
          id
          lastMessage {
            id
            content
            createdAt
            role
            aiAgent
            user { name }
          }
        }
      }
    }
  }
`;

async function loadProjects() {
  setListLoading();
  try {
    const data = await gql(LIST_QUERY);
    allProjects = data.projects.projects || [];
    renderList(allProjects);
    refreshDot.style.background = '#34C759';
    // If pipeline tab was open, refresh it too
    if (pipelineLoaded) renderPipeline(allProjects);
  } catch (err) {
    console.error('loadProjects:', err);
    setListError(err.message);
    refreshDot.style.background = '#FF3B30';
  }
}

function setListLoading() {
  chatList.innerHTML = `
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading projects…</div>
    </div>`;
}

function setListError(msg) {
  chatList.innerHTML = `
    <div class="error-state">
      <div class="error-icon">⚠️</div>
      <div class="error-text">Couldn't load projects.<br><small style="color:#444">${escHtml(msg)}</small></div>
      <button class="retry-btn" id="retry-btn">Try Again</button>
    </div>`;
  document.getElementById('retry-btn')?.addEventListener('click', loadProjects);
}

function renderList(projects) {
  if (!projects.length) {
    chatList.innerHTML = `<div class="loading-state"><div class="loading-text">No projects found.</div></div>`;
    return;
  }

  chatList.innerHTML = '';
  const frag = document.createDocumentFragment();

  projects.forEach(p => {
    const nm      = p.name?.trim() || 'Unknown';
    const stage   = p.recordStatus || '—';
    const sc      = stageColor(stage);
    const roomId  = p.projectGeneralChatRoom?.id || null;
    const lastMsg = p.projectGeneralChatRoom?.lastMessage;
    const init    = initials(nm);
    const bg      = avatarColor(nm);
    const ts      = relativeTime(p.updatedAt);
    const repName = p.user?.name || '';

    let preview = '';
    if (lastMsg) {
      const plain  = stripHtml(lastMsg.content);
      const sender = lastMsg.role === 'assistant' ? 'Clarity' : (lastMsg.user?.name || repName || 'You');
      preview = `${sender}: ${plain}`;
    } else {
      preview = `${stage} · ${p.daysInStatus || '0'} days`;
    }

    const item = document.createElement('div');
    item.className = 'chat-item';
    item.dataset.projectId   = p.id;
    item.dataset.name        = nm;
    item.dataset.stage       = stage;
    item.dataset.statusColor = sc;
    item.dataset.roomId      = roomId || '';
    item.dataset.daysInStatus = p.daysInStatus || '0';
    item.dataset.repName     = repName;

    item.innerHTML = `
      <div class="chat-avatar" style="background:${bg}">
        <span>${init}</span>
        ${sc ? `<div class="chat-status ${sc}"></div>` : ''}
      </div>
      <div class="chat-content">
        <div class="chat-top-row">
          <span class="chat-name">${escHtml(nm)} — ${escHtml(stage)}</span>
          <span class="chat-time">${escHtml(ts)}</span>
        </div>
        <div class="chat-preview">${escHtml(preview.slice(0, 80))}</div>
      </div>`;

    item.addEventListener('click', () => openChat(item));
    frag.appendChild(item);
  });

  chatList.appendChild(frag);
}

/* ── Search ──────────────────────────────────────────────── */
searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim().toLowerCase();
  if (!allProjects.length) return;
  const filtered = searchQuery
    ? allProjects.filter(p =>
        (p.name || '').toLowerCase().includes(searchQuery) ||
        (p.recordStatus || '').toLowerCase().includes(searchQuery) ||
        (p.user?.name || '').toLowerCase().includes(searchQuery)
      )
    : allProjects;
  renderList(filtered);
});

/* ── Refresh ─────────────────────────────────────────────── */
refreshBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  refreshDot.style.background = '#FF9500';

/* ══════════════════════════════════════════════════════════
   PIPELINE TAB — Render & Refresh
══════════════════════════════════════════════════════════ */

/* Pipeline-specific query (lighter, no chat room data needed) */
const PIPELINE_QUERY = `
  query PipelineProjects {
    projects(page: 1, perPage: 100, mine: false) {
      totalPages
      projects {
        id
        name
        recordStatus
        daysInStatus
        user { name }
        updatedAt
      }
    }
  }
`;

async function loadPipeline() {
  setPipelineLoading();
  pipelineRefreshDot.style.background = '#FF9500';
  try {
    const data = await gql(PIPELINE_QUERY);
    const projects = data.projects?.projects || [];
    // Merge into allProjects if messages hasn't loaded yet
    if (!allProjects.length) allProjects = projects;
    renderPipeline(projects);
    pipelineRefreshDot.style.background = '#34C759';
  } catch (err) {
    console.error('loadPipeline:', err);
    setPipelineError(err.message);
    pipelineRefreshDot.style.background = '#FF3B30';
  }
}

function setPipelineLoading() {
  const scrollable = document.getElementById('pipeline-scrollable');
  scrollable.innerHTML = `
    <div id="pipeline-loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading pipeline…</div>
    </div>`;
}

function setPipelineError(msg) {
  const scrollable = document.getElementById('pipeline-scrollable');
  scrollable.innerHTML = `
    <div class="error-state">
      <div class="error-icon">⚠️</div>
      <div class="error-text">Couldn't load pipeline.<br><small style="color:#444">${escHtml(msg)}</small></div>
      <button class="retry-btn" id="pipeline-retry-btn">Try Again</button>
    </div>`;
  document.getElementById('pipeline-retry-btn')?.addEventListener('click', loadPipeline);
}

function renderPipeline(projects) {
  pipelineLoaded = true;

  // If no data yet, trigger a fetch
  if (!projects || !projects.length) {
    loadPipeline();
    return;
  }

  const scrollable = document.getElementById('pipeline-scrollable');

  /* ── Group by recordStatus ────────────────────────────── */
  const grouped = {};
  projects.forEach(p => {
    const s = (p.recordStatus || 'UNKNOWN').toUpperCase();
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(p);
  });

  /* ── Sort stages by canonical order ──────────────────── */
  const sortedStages = Object.keys(grouped).sort((a, b) => stageRank(a) - stageRank(b));

  /* ── Summary stats ────────────────────────────────────── */
  const total  = projects.length;
  const greens = projects.filter(p => stageColor(p.recordStatus) === 'green').length;
  const ambers = projects.filter(p => stageColor(p.recordStatus) === 'amber').length;
  const reds   = projects.filter(p => stageColor(p.recordStatus) === 'red').length;
  const avgDays = projects.length
    ? Math.round(projects.reduce((s, p) => s + (parseInt(p.daysInStatus) || 0), 0) / projects.length)
    : 0;

  /* ── Build HTML ──────────────────────────────────────── */
  const stageCardsHtml = sortedStages.map(stage => {
    const ps   = grouped[stage];
    const sc   = stageColor(stage);
    const avg  = Math.round(ps.reduce((s, p) => s + (parseInt(p.daysInStatus) || 0), 0) / ps.length);

    const projectRowsHtml = ps
      .sort((a, b) => (parseInt(b.daysInStatus)||0) - (parseInt(a.daysInStatus)||0))
      .map(p => {
        const nm   = p.name?.trim() || 'Unknown';
        const init = initials(nm);
        const bg   = avatarColor(nm);
        const days = parseInt(p.daysInStatus) || 0;
        const dc   = days > 30 ? 'red' : days > 14 ? 'amber' : 'green';
        const rep  = p.user?.name ? `${p.user.name}` : '';
        return `
          <div class="project-row" data-project-id="${escHtml(p.id)}" data-project-name="${escHtml(nm)}" data-stage="${escHtml(stage)}">
            <div class="project-avatar-sm" style="background:${bg}">${escHtml(init)}</div>
            <div class="project-info">
              <div class="project-name">${escHtml(nm)}</div>
              <div class="project-sub">${rep ? escHtml(rep) + ' · ' : ''}${escHtml(stage)}</div>
            </div>
            <div class="project-days-badge ${dc}">${days}d</div>
          </div>`;
      }).join('');

    return `
      <div class="stage-card" data-stage="${escHtml(stage)}">
        <div class="stage-header">
          <div class="stage-color-bar ${sc}"></div>
          <div class="stage-info">
            <div class="stage-name">${escHtml(stage)}</div>
            <div class="stage-meta">avg ${avg}d in stage</div>
          </div>
          <div class="stage-right">
            <div class="stage-badge ${sc}">${ps.length}</div>
            <div class="stage-chevron">›</div>
          </div>
        </div>
        <div class="stage-projects">
          <div class="stage-divider"></div>
          ${projectRowsHtml}
        </div>
      </div>`;
  }).join('');

  scrollable.innerHTML = `
    <div class="pipeline-summary-card">
      <div class="pipeline-stat">
        <div class="pipeline-stat-value blue">${total}</div>
        <div class="pipeline-stat-label">Total</div>
      </div>
      <div class="pipeline-stat">
        <div class="pipeline-stat-value green">${greens}</div>
        <div class="pipeline-stat-label">On Track</div>
      </div>
      <div class="pipeline-stat">
        <div class="pipeline-stat-value amber">${ambers}</div>
        <div class="pipeline-stat-label">Active</div>
      </div>
      <div class="pipeline-stat">
        <div class="pipeline-stat-value red">${reds}</div>
        <div class="pipeline-stat-label">At Risk</div>
      </div>
    </div>

    <div class="pipeline-section-label">${sortedStages.length} stages · ${total} projects</div>

    ${stageCardsHtml}
  `;

  /* ── Wire up expand/collapse ──────────────────────────── */
  scrollable.querySelectorAll('.stage-card').forEach(card => {
    const header = card.querySelector('.stage-header');
    header.addEventListener('click', () => {
      card.classList.toggle('expanded');
    });
  });

  /* ── Wire up project rows → open chat ────────────────── */
  scrollable.querySelectorAll('.project-row').forEach(row => {
    row.addEventListener('click', () => {
      const pid   = row.dataset.projectId;
      const pname = row.dataset.projectName;
      const pstage= row.dataset.stage;
      // Find the matching project in allProjects for full data
      const proj  = allProjects.find(p => p.id === pid);
      if (proj) {
        // Build a synthetic item dataset to reuse openChat
        const synthetic = {
          dataset: {
            projectId:    proj.id,
            name:         proj.name?.trim() || pname,
            stage:        proj.recordStatus || pstage,
            statusColor:  stageColor(proj.recordStatus || pstage),
            roomId:       proj.projectGeneralChatRoom?.id || '',
            daysInStatus: String(proj.daysInStatus || '0'),
            repName:      proj.user?.name || '',
          }
        };
        openChat(synthetic);
      }
    });
  });
}

/* ── Pipeline refresh ────────────────────────────────────── */
pipelineRefreshBtn.addEventListener('click', () => {
  pipelineRefreshDot.style.background = '#FF9500';
  loadPipeline();
});

/* ══════════════════════════════════════════════════════════
   CHAT VIEW — Open & Render
══════════════════════════════════════════════════════════ */
const MESSAGES_QUERY = `
  query RoomMessages($roomId: ID!) {
    messages(roomId: $roomId) {
      id
      content
      role
      createdAt
      aiAgent
      user { name }
    }
  }
`;

const CREATE_MESSAGE_MUTATION = `
  mutation CreateMessage($roomId: ID!, $content: String!) {
    createMessage(roomId: $roomId, content: $content) {
      id
      content
      role
      createdAt
      aiAgent
      user { name }
    }
  }
`;

function openChat(item) {
  const name    = item.dataset.name;
  const stage   = item.dataset.stage;
  const sc      = item.dataset.statusColor;
  const roomId  = item.dataset.roomId;
  const days    = item.dataset.daysInStatus;
  const repName = item.dataset.repName;
  const bg      = avatarColor(name);
  const init    = initials(name);

  activeProject = { id: item.dataset.projectId, name, stage, roomId, daysInStatus: days, repName };

  // Update header
  headerAvatar.style.background = bg;
  headerAvatar.textContent = init;
  headerName.textContent   = name;

  const stageColors = { green:'#34C759', amber:'#FF9500', red:'#FF3B30' };
  const dot = sc ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${stageColors[sc]};margin-right:4px;vertical-align:middle;"></span>` : '';
  headerStage.innerHTML = `${dot}${escHtml(stage)} · ${days}d`;

  // Slide in
  viewList.classList.add('pushed');
  viewChat.classList.add('active');

  msgContent.innerHTML = '';
  typingEl.style.display = 'none';

  if (roomId) {
    showChatLoading();
    fetchMessages(roomId);
  } else {
    showNoRoomState(name, stage, days);
  }
}

function showChatLoading() {
  msgContent.innerHTML = `
    <div class="chat-loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading conversation…</div>
    </div>`;
}

function showNoRoomState(name, stage, days) {
  msgContent.innerHTML = `
    <div class="empty-state" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:8px;">
      <div style="font-size:32px">💬</div>
      <div style="font-size:15px;font-weight:600;color:#fff">${escHtml(name)}</div>
      <div style="font-size:13px;color:#636366;text-align:center">${escHtml(stage)} · ${days} days<br>No Clarity conversation yet.</div>
    </div>`;
  requestAnimationFrame(() => requestAnimationFrame(() => scrollToBottom(false)));
}

async function fetchMessages(roomId) {
  try {
    const data = await gql(MESSAGES_QUERY, { roomId });
    renderMessages(data.messages || []);
  } catch (err) {
    console.error('fetchMessages:', err);
    msgContent.innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠️</div>
        <div class="error-text">Couldn't load messages.<br><small style="color:#444">${escHtml(err.message)}</small></div>
      </div>`;
  }
}

function renderMessages(msgs) {
  msgContent.innerHTML = '';

  if (!msgs.length) {
    msgContent.innerHTML = `
      <div class="empty-state" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;gap:8px;">
        <div style="font-size:32px">✦</div>
        <div style="font-size:13px;color:#636366;text-align:center">Start the conversation.<br>Ask Clarity anything about this project.</div>
      </div>`;
    requestAnimationFrame(() => requestAnimationFrame(() => scrollToBottom(false)));
    return;
  }

  const sorted = [...msgs].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

  /* Track the latest message id for polling */
  if (sorted.length) lastKnownMsgId = sorted[sorted.length - 1].id;

  let lastTs   = null;
  let lastRole = null;

  sorted.forEach((msg, i) => {
    const role  = msg.role === 'assistant' ? 'received' : 'sent';
    const plain = stripHtml(msg.content);
    if (!plain) return;

    const msgDate = new Date(msg.createdAt);
    const showTs  = !lastTs || (msgDate - lastTs) > 30 * 60 * 1000;
    if (showTs) {
      const div = document.createElement('div');
      div.className = 'msg-ts-divider';
      div.textContent = formatMsgTs(msg.createdAt);
      msgContent.appendChild(div);
      lastTs = msgDate;
    }

    const isGroupGap = lastRole !== null && lastRole !== role && !showTs;
    const isLast = (() => {
      for (let j = i + 1; j < sorted.length; j++) {
        const next = sorted[j];
        if (!stripHtml(next.content)) continue;
        const nextRole = next.role === 'assistant' ? 'received' : 'sent';
        return nextRole !== role || (new Date(next.createdAt) - msgDate) > 30 * 60 * 1000;
      }
      return true;
    })();

    const row = document.createElement('div');
    row.className = `msg-row ${role}${isGroupGap ? ' group-gap' : ''}`;

    if (role === 'received') {
      const av = document.createElement('div');
      av.className = 'msg-avatar' + (isLast ? '' : ' hidden');
      av.textContent = '✦';
      row.appendChild(av);
    }

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}${isLast ? ' tail' : ''}`;
    bubble.textContent = plain;
    row.appendChild(bubble);
    msgContent.appendChild(row);

    if (role === 'sent' && isLast) {
      const dr = document.createElement('div');
      dr.className = 'delivery-row';
      dr.innerHTML = '<span class="delivery-receipt">Delivered</span>';
      msgContent.appendChild(dr);
    }

    lastRole = role;
  });

  requestAnimationFrame(() => requestAnimationFrame(() => scrollToBottom(false)));
}

/* ── Back ────────────────────────────────────────────────── */
function goBack() {
  stopPolling();
  viewChat.classList.remove('active');
  viewList.classList.remove('pushed');
  activeProject = null;
  lastKnownMsgId = null;
  sendPending = false;
  setTimeout(() => {
    msgContent.innerHTML = '';
    typingEl.style.display = 'none';
  }, 350);
}

/* ── Scroll to bottom ────────────────────────────────────── */
function scrollToBottom(smooth = true) {
  messagesArea.scrollTo({ top: messagesArea.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}

/* ── Optimistic bubble helpers ───────────────────────────── */
function appendOptimisticBubble(text) {
  /* Remove empty-state placeholder if present */
  const emptyEl = msgContent.querySelector('.empty-state');
  if (emptyEl) emptyEl.remove();

  const row = document.createElement('div');
  row.className = 'msg-row sent group-gap';
  const bubble = document.createElement('div');
  bubble.className = 'bubble sent tail';
  bubble.textContent = text;
  row.appendChild(bubble);
  msgContent.appendChild(row);

  const dr = document.createElement('div');
  dr.className = 'delivery-row';
  dr.id = 'optimistic-receipt';
  dr.innerHTML = '<span class="delivery-receipt">Sending…</span>';
  msgContent.appendChild(dr);
  scrollToBottom();
  return dr;
}

function markDelivered(dr) {
  if (dr) dr.innerHTML = '<span class="delivery-receipt">Delivered</span>';
  scrollToBottom();
}

function appendAIBubble(text) {
  typingEl.style.display = 'none';
  const rRow = document.createElement('div');
  rRow.className = 'msg-row received group-gap';
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = '✦';
  const rb = document.createElement('div');
  rb.className = 'bubble received tail';
  rb.textContent = text;
  rRow.appendChild(av);
  rRow.appendChild(rb);
  msgContent.appendChild(rRow);
  scrollToBottom();
}

/* ── Stop AI response polling ────────────────────────────── */
function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

/* ── Poll for Clarity AI response every 2s ───────────────── */
function startPollingForResponse(roomId, afterMsgId) {
  stopPolling();
  let attempts = 0;
  const MAX_ATTEMPTS = 30; // 60s max

  pollInterval = setInterval(async () => {
    attempts++;
    if (attempts > MAX_ATTEMPTS) {
      stopPolling();
      typingEl.style.display = 'none';
      return;
    }
    /* Guard: if user has navigated away from this room, stop */
    if (!activeProject || activeProject.roomId !== roomId) {
      stopPolling();
      return;
    }
    try {
      const data = await gql(MESSAGES_QUERY, { roomId });
      const msgs = data.messages || [];
      const sorted = msgs.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      /* Find the newest assistant message that arrived after our sent message */
      const newAI = sorted.find(
        m => m.role === 'assistant' && m.id !== afterMsgId && m.id > afterMsgId
      );
      if (newAI) {
        stopPolling();
        const plain = stripHtml(newAI.content);
        if (plain) appendAIBubble(plain);
      }
    } catch (err) {
      console.warn('poll error:', err);
    }
  }, 2000);
}

/* ── Send message ────────────────────────────────────────── */
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !activeProject || sendPending) return;

  const roomId = activeProject.roomId;
  if (!roomId) {
    /* No room: show inline error */
    showNoRoomState(activeProject.name, activeProject.stage, activeProject.daysInStatus);
    return;
  }

  sendPending = true;
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendBtn.classList.remove('inactive');
  sendBtn.classList.add('sending');

  /* 1. Optimistic UI — bubble appears immediately */
  const drEl = appendOptimisticBubble(text);

  try {
    /* 2. POST createMessage mutation */
    const data = await gql(CREATE_MESSAGE_MUTATION, { roomId, content: text });
    const sentMsg = data?.createMessage;

    markDelivered(drEl);

    /* 3. Show typing indicator, start polling for AI reply */
    typingEl.style.display = 'flex';
    scrollToBottom();

    const afterId = sentMsg?.id || lastKnownMsgId || '0';
    startPollingForResponse(roomId, afterId);

  } catch (err) {
    console.error('sendMessage:', err);
    /* Mark failed */
    if (drEl) drEl.innerHTML = '<span class="delivery-receipt" style="color:#FF3B30">⚠ Failed — tap to retry</span>';
    drEl.style.cursor = 'pointer';
    drEl.onclick = () => { drEl.remove(); msgInput.value = text; sendBtn.classList.remove('inactive'); };
  } finally {
    sendPending = false;
    sendBtn.classList.remove('sending');
  }
}

/* ── Input auto-resize & send btn state ─────────────────── */
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 96) + 'px';
  sendBtn.classList.toggle('inactive', msgInput.value.trim() === '');
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

sendBtn.addEventListener('click', sendMessage);
backBtn.addEventListener('click', goBack);

/* ── iOS keyboard: scroll to bottom ─────────────────────── */
if (typeof visualViewport !== 'undefined') {
  visualViewport.addEventListener('resize', () => {
    if (viewChat.classList.contains('active')) {
      requestAnimationFrame(() => scrollToBottom(false));
    }
  });
}

/* ── Live clock ──────────────────────────────────────────── */
function updateClock() {
  document.getElementById('status-time').textContent =
    new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 30000);

/* ── Service Worker ──────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(r => console.log('SW:', r.scope))
    .catch(e => console.log('SW err:', e));
}

/* ── Bootstrap ───────────────────────────────────────────── */
(async () => {
  const restored = await tryRestoreSession();
  if (restored) {
    dismissLogin();
    loadProjects();
  } else {
    showLogin();
    /* Prefill dev convenience — remove for prod */
    // loginUserIdEl.value = '';
  }
})();
</script>
